name: The Barrow King
ac: 15
hp: 30
speed: 6
attributes: {STR: 16, DEX: 12, CON: 16, INT: 10, WIS: 12, CHA: 14}
attacks:
  - {name: kingsblade, attack_mod: 7, damage: 1d8+3, range: 1}
  - {name: dread wail, attack_mod: 6, damage: 1d4, range: 8}
xp: 450
loot: {gold: 4d10, items: [kings_circlet]}
difficulty: boss
notes: >
  A hit from the dread wail leaves its victim shaken: the GM applies
  the frightened effect (effect add --target <pc> --name frightened
  --duration 2) for as long as the Barrow King remains in view.
