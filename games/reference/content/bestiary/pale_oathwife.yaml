# field meanings: see bestiary/goblin.yaml
name: The Pale Oathwife
description: >
  Sigrun, Hravik's oath-priestess, drowned in the undercroft cistern so
  her king would never lack counsel in death. She rises from the black
  water grey-lipped and calm, wearing her wedding braids and three
  centuries of patience, and she wants the circlet back.
ac: 16
hp: 44
speed: 6
attributes: {STR: 14, DEX: 12, CON: 16, INT: 14, WIS: 16, CHA: 16}
attacks:
  - {name: cistern-cold grasp, attack_mod: 7, damage: 2d6+2, range: 1}
  - {name: drowning benediction, attack_mod: 6, damage: 1d8, range: 10}
xp: 2800
loot: {gold: 6d10, items: [oathwifes_torc]}
difficulty: hard
notes: >
  A hit from the drowning benediction fills the victim's lungs with cold
  cistern water: the GM applies the poisoned effect (effect add --target
  <pc> --name poisoned --duration 3). If the party carries the
  kings_circlet, she directs every benediction at its bearer first.
