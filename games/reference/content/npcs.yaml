reeve_halda:
  name: Reeve Halda
  location: thornbury
  role: quest-giver
  disposition: friendly
  wants: >
    Halda wants the Barrowdeep sealed again before the goblin raids spreading
    from it reach Thornbury's fields. She will hire the party to clear the
    barrow, pay 100 gp on their return, and speak for them before the Moot.

innkeep_bram:
  name: Innkeeper Bram
  location: thornbury
  role: rumor-monger
  disposition: friendly
  wants: >
    Bram wants a full taproom and a fresh story to tell it. He trades a
    night's board for news from the road and will pass along everything
    he's heard about the barrow to anyone who buys a round.

pedlar_okko:
  name: Pedlar Okko
  location: old-road
  role: merchant
  disposition: neutral
  # what Okko sells — the viewer's shop card reads this; prices come from
  # ruleset/items.yaml. A road-peddler's pack.
  stock:
    - {item: torch, qty: 6}
    - {item: rope, qty: 2}
    - {item: dagger, qty: 2}
    - {item: shortbow, qty: 1}
    - {item: thieves_tools, qty: 1}
    - {item: healing_potion, qty: 1}
  wants: >
    Okko wants safe passage and steady trade along the Old Road. He buys
    and sells at the list prices in ruleset/items.yaml, and will share
    what he's seen on the road — goblin sign, the ambush site, tracks
    toward Barrow Woods — if the party is civil with him.

diver_wenna:
  name: Wenna the Diver
  location: barrowdeep
  role: guide
  disposition: neutral
  wants: >
    Wenna is a river-salvager who came upvalley on the Moot broker's coin
    to sound the flooded galleries, and what she found down there scared
    her off the contract. She wants her rope, her lamp-oil debt to Okko
    paid, and someone else to go down the Sunken Stair; she will trade a
    hand-drawn depth map and fair warning about the "grey woman in the
    water" for 20 gp or a share of any salvage.

farmer_tobin:
  name: Farmer Tobin
  location: thornbury
  role: quest-giver
  disposition: friendly
  gold: 20
  inventory: [{item: healing_potion, qty: 1}]
  wants: >
    Tobin wants his prize sow Tuffles found before something in Barrow
    Woods finds her first. He raised her from a piglet, entered her in
    every Thornbury fair since, and is certain she wandered off chasing
    acorns rather than being taken. He'll pay what he can spare and
    throw in a hedge-cleric's parting gift he's been saving for an
    emergency, because this feels like one.
