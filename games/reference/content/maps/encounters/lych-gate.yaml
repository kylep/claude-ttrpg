# field meanings: see maps/encounters/road-ambush.yaml
# Optional dusk encounter for the Graveyard Risings hook — see quest-board.md.
# The gate wall screens the spawns from both monsters: the party arrives
# unseen, and a stealthy PC can `engine hide` before the first move.
id: lych-gate
name: The Lych-Gate at Dusk
grid: {width: 10, height: 7}
terrain:
  - {type: wall, cells: [[4, 2], [4, 3], [4, 4], [7, 1]]}       # gate wall and the old yew
  - {type: difficult, cells: [[5, 2], [5, 3], [5, 4], [6, 4]]}  # rain-soft grave mud
monsters:
  - {type: lych_crake, pos: [7, 3]}
  - {type: grave_walker, pos: [8, 4]}
pc_spawns: [[1, 2], [1, 3], [1, 4], [2, 3]]
