name: rogue
description: >
  A knife-quiet opportunist who fights dirty and moves first — deadliest when
  striking from shadow or beside a distracted foe.
hit_die: 8        # d8, controls starting HP, per-level HP gain, and short-rest healing
cast_attr: null   # non-caster
skill_choices: 3  # how many skills to pick from the list below at creation
attr_priority: [DEX, CON, INT, WIS, CHA, STR]  # wizard default: standard array fills these high-to-low
skills: [stealth, perception, deception, acrobatics, sleight_of_hand]
starting_gear: [leather_armor, dagger, dagger]  # item ids from ruleset/items.yaml
starting_gold: 15
levels:  # per-level: features (flavor tags, GM-adjudicated), spells learned, spell slots {level: count}
  1: {features: [sneak_attack], spells: [], slots: {}}
  2: {features: [slippery_footwork], spells: [], slots: {}}
  3: {features: [untouchable], spells: [], slots: {}}
  4: {features: [ghost_step], spells: [], slots: {}}
  5: {features: [exploit_opening], spells: [], slots: {}}
