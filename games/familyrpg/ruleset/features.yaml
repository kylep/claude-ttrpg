# Class feature tags. The engine treats these as opaque tags on the sheet;
# each description tells the GM how to adjudicate the feature at the table
# (via --adv/--dis flags, `engine heal`, `engine attack`, extra rolls, or
# plain rulings). description is the GM's how-to; keep it precise.
#
# ── Fighter ──────────────────────────────────────────────────────────────
second_wind:
  description: >
    Signature. Once per short rest, as their action or a spare moment, the
    fighter catches a second wind: the GM applies `engine heal` for 1d10 +
    the fighter's level to the fighter.
combat_style:
  description: >
    At creation of this feature the player picks one fighting style, a
    lasting edge the GM applies by hand: Blade (--adv on the first attack
    roll each encounter), Guard (+1 AC while a shield or two-handed weapon is
    held), Archer (ignore the in-melee --dis on ranged attacks), or Brawler
    (+2 damage on every melee hit). Note the pick on the sheet; it never
    changes.
battle_focus:
  description: >
    Identity. The fighter has a focus die (a d6) and 2 focus points per short
    rest. Before or after any one `engine attack`, `engine save`, or `engine
    check` roll, spend a point and the GM adds one focus die to that roll's
    total. Later features grow the die and the number of points.
deep_reserves:
  description: >
    Numeric bump. Second_wind now heals 2d10 + level instead of 1d10 + level,
    and the fighter has a second use of it per short rest.
extra_attack:
  description: >
    Spike. Whenever the character takes the attack action, they attack twice:
    the GM runs two separate `engine attack` rolls.
sharper_focus:
  description: >
    Numeric bump. The battle_focus die grows from a d6 to a d8, and the
    fighter now has 3 focus points per short rest.
battle_tested:
  description: >
    The fighter rolls initiative with --adv (`engine initiative --adv`) and
    cannot be surprised while conscious; the GM never denies them their first
    turn to an ambush.
extra_wind:
  description: >
    Numeric bump. The fighter gains one more use of second_wind per short
    rest (three total once combined with deep_reserves).
indomitable:
  description: >
    Once per long rest, when the fighter fails a saving throw, they may reroll
    it and must take the new result: the GM re-runs that `engine save`.
keen_focus:
  description: >
    Numeric bump. The battle_focus die grows from a d8 to a d10.
improved_extra_attack:
  description: >
    Spike. The fighter's attack action now makes three attacks: the GM runs
    three separate `engine attack` rolls.
relentless_focus:
  description: >
    Numeric bump. Whenever the fighter scores a critical hit (natural 20) on
    an `engine attack`, they immediately regain one spent focus point.
hardened_resolve:
  description: >
    Numeric bump. The fighter gains a second use of indomitable per long rest.
mighty_focus:
  description: >
    Numeric bump. The battle_focus die grows from a d10 to a d12.
unyielding:
  description: >
    Numeric bump. When the fighter uses indomitable, they reroll the failed
    save with --adv (`engine save --adv`) and take the better result.
master_at_arms:
  description: >
    Spike. Pick a second combat_style (apply both). In addition, once per
    turn when the fighter misses with an `engine attack`, they may reroll that
    single attack once.
sure_strike:
  description: >
    Numeric bump. The fighter's weapon attacks now score a critical hit on a
    natural 19 as well as 20; the GM doubles the damage dice by hand on a 19,
    since the engine only auto-crits on a 20.
third_wind:
  description: >
    Numeric bump. The fighter gains a fourth focus point per short rest and a
    third use of indomitable per long rest.
tireless:
  description: >
    Numeric bump. At the start of each of the fighter's turns in combat, if
    they are below half their maximum HP, the GM applies `engine heal` for 5
    to them automatically.
champion:
  description: >
    Capstone. The fighter's attack action now makes four attacks (four
    separate `engine attack` rolls), and whenever they spend a battle_focus
    point the die always counts as its maximum value instead of being rolled.
# ── Barbarian ────────────────────────────────────────────────────────────
rage:
  description: >
    Signature. Once per long rest to start (see rugged_recovery, tireless_fury,
    deeper_fury, and endless_fury for more uses), as a bonus or free action
    before their turn's action the barbarian flies into a rage: the GM applies
    the `raging` effect to them, lasting until the fight ends, they choose to
    calm down, or (before persistent_rage) they go a full turn without
    attacking or taking damage. On top of raging's own +2 melee bonus, every
    melee `engine attack` hit while raging also adds a rage rider die — 1d4 at
    this level — to the damage total by hand. Later features grow the die.
unarmored_defense:
  description: >
    Signature, GM-adjudicated, shared by the barbarian and the monk. While
    wearing no armor, the character's own conditioning stands in for armor:
    AC = 10 + DEX modifier + a second attribute modifier. For the barbarian
    that second attribute is CON, and a carried shield still adds its usual
    +2 by hand on top. For the monk it is WIS instead, and the monk's hands
    must both be free (or holding only a quarterstaff) — no shield — for
    this AC to apply. Since `derive.armor_class` only reads equipped armor
    items, the GM sets the resulting total by hand on the sheet at creation
    (attributes are fixed for life, so it never needs recalculating).
wild_sprint:
  description: >
    The barbarian's legs never tire of open ground: their speed increases by
    2 squares at all times, and difficult terrain costs them no extra
    movement — the GM waives the doubled move cost for them.
reckless_assault:
  description: >
    Identity. On their turn, before attacking, the barbarian may declare a
    reckless assault: every `engine attack` they make this turn rolls with
    --adv, but every attack made against them before the start of their next
    turn also rolls with --adv. The GM notes the exposure and clears it at
    the top of the barbarian's next turn.
rugged_recovery:
  description: >
    Numeric bump. The barbarian gains a second rage per long rest. Once per
    short rest they may also catch their breath: the GM applies `engine heal`
    for 1d12 + the barbarian's level to them.
surging_fury:
  description: >
    Numeric bump. The rage rider die grows from 1d4 to 1d6.
feral_resilience:
  description: >
    While raging, the barbarian's nerve cannot be broken: the GM never applies
    the frightened effect to them, and every saving throw they make while
    raging rolls with --adv (`engine save --adv`).
danger_sense:
  description: >
    The barbarian's instincts scream before the trap springs: they roll DEX
    saving throws with --adv (`engine save --adv`) against dangers they can
    see coming — falling floors, swinging blades, gouts of flame — and the GM
    rolls their `engine initiative` with --adv as well, since they are rarely
    caught flat-footed.
hardened_hide:
  description: >
    Numeric bump. While raging, in addition to halving physical damage (per
    the `raging` effect) the barbarian now also halves damage from fire, cold,
    and lightning; the GM applies the extra reduction by hand.
brutal_strike:
  description: >
    Numeric bump. The rage rider die grows from 1d6 to 1d8. Once per turn,
    when the barbarian hits with a melee `engine attack` while raging, they
    may add a second rage rider die to that single hit.
tireless_fury:
  description: >
    Numeric bump. The barbarian now rages three times per long rest, and the
    short-rest recovery granted by rugged_recovery may be used twice per
    short rest.
relentless_rage:
  description: >
    Spike. The rage rider die grows from 1d8 to 1d10. While raging, if damage
    would drop the barbarian to 0 HP without killing them outright, they may
    make a CON saving throw (GM sets the DC at 10, +5 for each time they've
    used this since their last long rest); on a success the GM leaves them at
    1 HP instead of dropping them.
unbroken_will:
  description: >
    Numeric bump. The barbarian is immune to the frightened effect at all
    times, not only while raging, and every CON saving throw they make rolls
    with --adv (`engine save --adv`).
call_of_the_wild:
  description: >
    The wilds answer the barbarian's call: they roll Survival, Nature, and
    Perception checks with --adv (`engine check --adv`) while outdoors, and
    their presence unsettles ordinary beasts — the GM may rule a mundane
    animal backs off rather than press an attack against them.
deeper_fury:
  description: >
    Numeric bump. The barbarian now rages four times per long rest. The first
    time their rage rider die would be rolled in each rage, the GM instead
    counts it at its maximum value automatically.
persistent_rage:
  description: >
    The barbarian's fury no longer gutters on its own: a rage no longer ends
    early for going a turn without attacking or taking damage — only choosing
    to calm down, being knocked unconscious, or the fight ending clears it.
iron_constitution:
  description: >
    Numeric bump. The rage rider die grows from 1d10 to 1d12, matching the
    barbarian's hit die. The barbarian also gains a flat +2 HP per level from
    this point forward, added directly to their hit-die total as a feature
    bonus (their CON score itself never changes).
might_of_the_wilds:
  description: >
    Spike. While raging, the barbarian's blows carry the wild's whole weight:
    the rage rider die becomes two dice (2d12) added to every melee hit, and
    their melee `engine attack` rolls gain --adv for as long as the rage
    lasts.
unstoppable:
  description: >
    Numeric bump. While raging, the barbarian cannot be knocked prone or
    restrained: the GM waives the engine's automatic prone/restrained
    penalties for them, since nothing wild enough to trip them yet exists.
endless_fury:
  description: >
    Numeric bump. The barbarian may rage as many times per long rest as they
    need — the GM stops tracking a limit — though a short or long rest is
    still required to catch their breath between fights.
avatar_of_fury:
  description: >
    Capstone. While raging, the barbarian becomes a living avatar of fury:
    their melee `engine attack` rolls count a natural 19 as well as 20 as a
    critical hit (the GM doubles the damage dice by hand on a 19, since the
    engine only auto-crits on a 20), the rage rider die becomes 3d12, and the
    GM treats their raging damage reduction as full immunity to non-magical
    physical damage for the rest of the encounter.
# ── Rogue ────────────────────────────────────────────────────────────────
sneak_attack:
  description: >
    Signature, engine-enforced. `engine attack` automatically adds sneak
    dice to the damage whenever this exact feature id is on the sheet, the
    attack hits, is NOT at disadvantage, hasn't already triggered this round
    for this attacker, and either the attacker has advantage or a conscious
    ally is adjacent to the target. The dice are 1d6 at levels 1-2, 2d6 at
    levels 3-4, and 3d6 from level 5 onward — the engine's hard cap; it never
    grows past 3d6, even at level 20 (later spikes at L11/L17/L20 add power
    through OTHER features, not a bigger everyday sneak die). A critical hit
    doubles the sneak dice automatically. No GM action needed beyond having
    the feature id on the sheet before running `engine attack`.
deft_hands:
  description: >
    Signature utility. The rogue's hands move faster than the eye: while
    carrying thieves_tools, they roll `engine check --adv` on any check to
    pick a lock, disarm a mechanical trap, or lift something from a pocket
    unnoticed.
rogue_expertise:
  description: >
    Numeric bump. Note two of the rogue's trained skills on the sheet as
    their expertise; the rogue rolls `engine check --adv` on every check
    using those two skills for the rest of their career.
cunning_action:
  description: >
    Identity. The rogue's action economy bends around them: once per turn,
    on top of their one action, they may take a free extra action to dash
    (double their remaining movement this turn), disengage (move away — the
    GM waives any free attack an enemy would otherwise get), or attempt
    `engine hide`. This does not consume the turn's one action slot; the GM
    allows it as a standing exception for this feature only.
quick_step:
  description: >
    Numeric bump. The rogue's speed increases by 2 squares at all times, and
    when they use cunning_action to dash, difficult terrain costs them no
    extra movement that turn.
uncanny_dodge:
  description: >
    Spike. Sneak attack's dice reach their maximum this level — 3d6, the
    engine's hard cap — and stay there for the rest of the rogue's career (no
    further growth from a bigger die; later spikes come from other
    features). On top of that, once per round, when hit by an attack they
    can see, the rogue may halve the damage before it lands: the GM applies
    only half the rolled damage (round down) instead of the full total from
    that `engine attack`.
combat_instincts:
  description: >
    Numeric bump. The rogue's nerves read a fight half a breath early: the
    GM rolls their `engine initiative --adv`, and they cannot be surprised
    while conscious.
evasion:
  description: >
    Identity, shared by the rogue and the monk. When the character fails a
    DEX saving throw against an effect that deals half damage on a success
    (an area spell or a trap), they take no damage at all instead of half; a
    successful save already takes none. The GM applies this after `engine
    save` resolves: on a failed DEX save against a half-on-save effect,
    treat the outcome as a full success for damage purposes only.
greater_deft_hands:
  description: >
    Numeric bump. Deft_hands now succeeds automatically on any thieves_tools
    check against an easy DC (10) with no roll needed; harder locks and
    traps still require an `engine check --adv` roll as before.
reliable_talent:
  description: >
    Numeric bump. The rogue's trained skills rarely truly fail: whenever
    they roll an `engine check` using one of their chosen skills and the
    die (before modifiers) would show a 9 or lower, the GM treats it as a
    10 instead.
shadow_step:
  description: >
    Numeric bump. In dim light or darkness, once per turn the rogue may slip
    through a hostile-occupied square as part of their movement, ending
    their move outside its reach; the GM waives the usual block for this one
    case.
improved_sneak:
  description: >
    Spike, NOT a bigger sneak die. The engine's own sneak_attack only
    triggers once per round automatically. Once per round, in addition to
    that automatic trigger, the rogue may land sneak attack a second time
    this round on a different qualifying hit (advantage or an adjacent
    conscious ally, not at disadvantage). Because the engine's per-round
    tracking blocks a second automatic trigger, the GM rolls and adds this
    second set of sneak dice BY HAND — the same die count the rogue's level
    grants (capped at 3d6, per sneak_attack), doubled on a crit.
steady_nerve:
  description: >
    Numeric bump. The rogue's composure holds even at death's door: the GM
    lets them roll each death save twice and keep the better result.
slippery_mind:
  description: >
    Identity. The rogue's wits cannot be untangled: they are immune to the
    frightened effect, and every INT, WIS, or CHA saving throw they roll
    gets `engine save --adv`.
keen_eye:
  description: >
    Numeric bump. The rogue rolls `engine check --adv` on Perception and
    Investigation checks made to notice traps, hidden doors, or an ambush
    before it springs.
elusive:
  description: >
    Identity. The rogue is maddeningly hard to pin down: while conscious,
    the GM waives any advantage an attacker would otherwise gain against
    them from the engine's automatic conditions (attacking a prone target,
    attacking from hiding, and the like) — that roll resolves as a normal
    roll instead of at advantage, unless the attacker is invisible or the
    rogue is grappled or restrained.
deadly_precision:
  description: >
    Numeric bump. The rogue's attacks score a critical hit on a natural 19
    as well as 20; the GM doubles the damage dice and any sneak dice by hand
    on a 19, since the engine only auto-crits on a 20.
stroke_of_luck:
  description: >
    Spike, NOT a bigger sneak die. Once per short rest, immediately after
    rolling a miss on an `engine attack` or failing an `engine check`, the
    rogue calls on a stroke of luck: the GM treats that single d20 as if it
    had shown a natural 20 instead, with crit and auto-success rules
    applying as normal from there.
greater_evasion:
  description: >
    Numeric bump. Evasion now also softens the worst case: on a failed DEX
    save against an effect that would otherwise deal full damage on a fail
    (no half-on-save clause), the GM applies only half the rolled damage by
    hand instead of the full total.
point_blank_shot:
  description: >
    Numeric bump. The rogue's ranged attacks no longer suffer the engine's
    automatic ranged_in_melee disadvantage when a hostile is adjacent to
    them.
perfect_ambush:
  description: >
    Capstone, NOT a bigger sneak die. At the start of any combat where the
    rogue is hidden, hasn't yet acted, or is attacking a target that hasn't
    noticed them, their first `engine attack` of the encounter is rolled
    with --adv, guaranteeing sneak attack's trigger condition. The GM also
    adds one extra sneak die BY HAND to that first hit — the same die count
    their level grants (capped at 3d6) — since the engine's own scaling caps
    at 3d6 and won't add more automatically.
# ── Monk ─────────────────────────────────────────────────────────────────
martial_arts:
  description: >
    Signature, GM-run. The monk's hands and feet count as weapons: unarmed
    strikes and quarterstaff attacks may use DEX instead of STR for both the
    attack roll and damage whenever DEX is higher, and an unarmed strike
    deals a martial-arts die of damage instead of a single point — 1d4 at
    this level. There is no unarmed-strike entry in items.yaml, so the GM
    runs each unarmed hit as a normal `engine attack` using the
    martial-arts die by hand as the weapon damage. Whenever the monk takes
    the attack action using an unarmed strike or a quarterstaff, they may
    also make one extra unarmed strike as a bonus action at no ki cost (one
    more `engine attack` roll for the martial-arts die). The die grows to
    1d6 at level 5, 1d8 at level 11, and 1d10 at level 17.
ki:
  description: >
    Signature, GM-tracked resource. The monk carries a pool of ki points
    equal to their level (1 at level 1, growing by 1 each level up through
    20), noted on the sheet by hand; there is no engine ki counter, so the
    player marks points spent and the GM restores the pool to full after
    any short or long rest (`engine rest short` or `engine rest long`). Ki
    fuels flurry_of_blows, deflect_missiles' catch-and-throw,
    step_of_the_wind, diamond_soul's reroll, empty_body, and quivering_palm
    — each of those entries states its own ki cost in points.
unarmored_movement:
  description: >
    Meaningful. As long as the monk wears no armor and carries no shield,
    their speed increases by 2 squares at all times; the GM marks the
    higher speed on the sheet as their new baseline movement (used for
    `engine move`, dash distance, and jump distance) for as long as they
    stay unarmored.
flurry_of_blows:
  description: >
    Identity, ki-spent. Immediately after taking the attack action, the
    monk may spend 1 ki point to make two additional unarmed strikes as a
    bonus action: the GM runs two more `engine attack` rolls at the
    martial-arts die. This stacks with martial_arts' own free extra unarmed
    strike, so a full turn can produce the attack action's hits plus up to
    three bonus unarmed strikes when ki is spent.
deflect_missiles:
  description: >
    Identity, GM-adjudicated. When hit by a ranged weapon attack, the monk
    may use their reaction to catch or bat the missile aside: the GM
    reduces the damage from that one hit by 1d10 + the monk's DEX modifier
    + their level, applied by hand before recording the remainder as
    damage taken (damage cannot go below 0). If the reduction brings the
    damage to 0, the monk may spend 1 ki point to immediately hurl the
    deflected missile back: the GM runs one `engine attack` against the
    original attacker (if within the weapon's normal range) using the
    martial-arts die.
step_of_the_wind:
  description: >
    Numeric bump, ki-spent. As a bonus action, the monk may spend 1 ki
    point to Dash or Disengage (the GM waives any free attack an enemy
    would otherwise get on the disengage), and while doing so their jump
    distance is doubled for the turn — the GM extends any Athletics jump
    check's normal distance accordingly.
stunning_strike:
  description: >
    Spike. The martial-arts die grows to 1d6 at this level. Once per turn,
    when the monk hits a creature with a melee weapon or unarmed strike,
    they may spend 1 ki point to attempt a stunning strike: the GM has the
    target roll a CON save (`engine save`) against DC 8 + the monk's
    proficiency bonus (progression.yaml) + WIS modifier — computed by hand,
    since this is not an engine-tracked spell DC. On a failed save, the
    target is stunned until the end of the monk's next turn: the GM rules
    it can take no actions or reactions and cannot move, every attack
    against it during that window resolves with advantage, and any attack
    the target itself attempts automatically misses.
purity_of_body:
  description: >
    Meaningful. The monk's discipline burns out sickness and poison: from
    this level the GM treats them as immune to disease and to the
    `poisoned` effect (any attempt to apply poisoned to them is ignored).
    Their unarmed strikes and quarterstaff hits also count as enchanted for
    the purpose of overcoming a monster's resistance or immunity to
    nonmagical weapon damage — the GM applies full damage where a mundane
    weapon would be halved or blocked.
slow_fall:
  description: >
    Numeric bump, GM-adjudicated. When the monk falls and is not
    incapacitated, they may use their reaction to reduce the fall damage by
    5 times their level (an amount that only grows as they level up); the
    GM subtracts it from the fall damage total by hand before applying the
    remainder.
wholeness_of_body:
  description: >
    Numeric bump. Once per long rest, as an action, the monk may draw on
    their own discipline to mend themself: the GM applies `engine heal` for
    an amount equal to twice their monk level to them, no roll required.
stillness_of_mind:
  description: >
    Numeric bump, GM-adjudicated. Once per long rest, as an action, the
    monk may steady their own mind: the GM immediately removes the
    `frightened` or `charmed` effect from them (their choice if both are
    active), no save needed.
improved_flurry:
  description: >
    Spike. The martial-arts die grows to 1d8 at this level. The first use
    of flurry_of_blows each turn now costs no ki; only a second use of
    flurry_of_blows on the same turn still costs its usual 1 ki point.
diamond_soul:
  description: >
    Numeric bump, GM-adjudicated. The monk's training steadies every kind
    of nerve: from this level the GM treats them as proficient in all six
    saving throws (add their proficiency bonus to every `engine save`, not
    only ones already trained). In addition, once per short rest, when the
    monk fails a saving throw they may spend 1 ki point to reroll it: the
    GM re-runs that `engine save` and the new result stands.
tongue_of_sun_and_moon:
  description: >
    The monk's stillness lets them understand and be understood by any
    creature capable of language, spoken or otherwise; the GM rules that
    any creature able to speak at all can converse with them, no roll or
    spell required, though this does not grant the ability to read
    unfamiliar script.
focused_ki:
  description: >
    Numeric bump. The monk's control over their own ki sharpens: whenever
    they spend a ki point on flurry_of_blows, deflect_missiles, or
    step_of_the_wind, it works automatically with no roll needed (only
    quivering_palm still calls for the target's save). In addition, the
    monk regains 1 spent ki point (GM's choice which) whenever they roll a
    natural 20 on an `engine attack`.
timeless_body:
  description: >
    The monk's aging slows to a crawl and hunger and thirst no longer wear
    them down: the GM rules they suffer no ill effect from old age (though
    they can still die of it eventually) and can go without food or water
    far longer than an ordinary person before any exhaustion penalty
    applies.
empty_body:
  description: >
    Numeric bump, ki-spent. As an action, the monk may spend 4 ki points to
    turn invisible for 1 minute (the GM applies the `hidden` effect to them
    with no `engine hide` roll needed; it persists through movement and
    attacking, and clears early only if the monk chooses to end it or is
    knocked unconscious). Spending 8 ki points instead grants the same
    invisibility plus resistance to all damage but force for the same
    minute — the GM halves incoming damage from any other source by hand
    for its duration.
quivering_palm:
  description: >
    Spike. The martial-arts die grows to 1d10 at this level. Once per long
    rest, when the monk hits a creature with an unarmed strike, they may
    spend 3 ki points to set vibrations lingering in the target's body. At
    any point within the next 24 hours, as an action, the monk may spend
    their remaining ki to trigger them: the target rolls a CON save
    (`engine save`) against DC 8 + the monk's proficiency bonus + WIS
    modifier, computed by hand by the GM. On a failure the GM reduces the
    target to 0 HP; on a success the GM applies 10d10 damage instead.
    Ending the vibrations early, or the monk's death, harmlessly clears the
    effect.
unerring_body:
  description: >
    Numeric bump. The monk's reflexes are honed past the reach of chance:
    once per short rest, when they miss with an `engine attack` using an
    unarmed strike or quarterstaff, the GM lets them reroll that single
    attack and take the new result.
deepened_ki:
  description: >
    Numeric bump. Empty_body's two ki costs both drop by 1 (3 ki for
    invisibility alone, 7 ki for invisibility plus damage resistance), and
    diamond_soul's reroll may now be used twice per short rest instead of
    once.
perfect_self:
  description: >
    Capstone. If the monk would need to spend ki but their pool is already
    empty, once per long rest the GM grants them 4 ki points back
    immediately — their body finds discipline even when their reserves run
    dry. In addition, their martial-arts unarmed strikes now score a
    critical hit on a natural 19 as well as 20; the GM doubles the
    martial-arts die by hand on a 19, since the engine only auto-crits on a
    20.
# ── Wizard ───────────────────────────────────────────────────────────────
spellbook:
  description: >
    Signature, GM-adjudicated. The wizard's own spellbook holds every arc_
    spell on their sheet, copied out in careful hand; consulting it for a
    minute lets them roll an Arcana check about a magic item, ward, or bit
    of arcane writing with `engine check --adv`. If the book is ever lost
    or destroyed, a long rest with fresh paper, ink, and access to their
    known spells recreates it.
arcane_recovery:
  description: >
    Once per short rest, the wizard may spend ten minutes studying their
    spellbook to recover spent magic: the GM restores spell slots totaling
    half the wizard's level (round up), no single recovered slot higher
    than 4th level, distributed across the wizard's slot pool as the
    player chooses. Update the sheet's slot counts by hand; `engine rest
    short` does not track this on its own.
ritual_casting:
  description: >
    Identity. Any arc_ spell the wizard knows that has no lasting combat
    use — detect magic and similar exploration or utility spells, GM's
    call — may be cast as a ten-minute ritual without spending a slot: run
    `engine cast --caster <id> --spell <id>` as normal but do not deduct a
    slot afterward.
spell_secrets:
  description: >
    Numeric bump. The wizard's grasp of theory outruns their spellbook:
    once per long rest, they may cast one known arc_ spell without
    expending a slot, as though they had one in reserve — the GM runs
    `engine cast` as normal but leaves the slot count untouched.
improved_recovery:
  description: >
    Numeric bump. Arcane_recovery's short-rest study now restores slots
    totaling the wizard's full level (round up) instead of half, still
    capped at no single slot higher than 4th level.
arcane_mastery:
  description: >
    Numeric bump. Once per long rest, when the wizard casts an arc_ spell
    that calls for a saving throw, they may force the GM to roll that
    save twice and keep the lower result for the target.
potent_spellcasting:
  description: >
    Numeric bump. The wizard's cantrips hit harder: add the wizard's INT
    modifier to the damage of any arc_ cantrip that deals damage, on top
    of its normal rolled damage.
spell_mastery:
  description: >
    The wizard picks one known 1st-level and one known 2nd-level arc_
    spell as their mastered spells; from this level on, casting either of
    those two specific spells costs no slot at all — the GM runs `engine
    cast` as normal but never deducts a slot for those two spell ids.
archmage:
  description: >
    Capstone. Once per long rest, the wizard may cast any two known arc_
    spells back to back without spending slots for either — the GM runs
    both `engine cast` calls and leaves the slot counts untouched. In
    addition, pick one known spell of 6th level or lower as a signature
    spell: from this level it always costs one slot lower than its actual
    level (a 5th-level signature spell spends a 4th-level slot, and so
    on, never below 1st).
# ── Cleric ───────────────────────────────────────────────────────────────
channel_light:
  description: >
    Signature, GM-run. Once per short rest, as an action, the cleric
    channels their patron's light: choose to sear (the GM rolls one
    `engine attack` against a target within range, treating a hit as
    1d8 radiant damage, no weapon needed) or to mend (the GM applies
    `engine heal` for 1d8 + the cleric's WIS modifier to one creature
    they can touch). The die and number of uses grow at later levels
    (see greater_channel_light and improved_channel_light).
turn_undead:
  description: >
    As an action, the cleric presents their holy symbol and
    channel_light's light turns the unliving: the GM has every undead
    creature within 6 squares that can see or hear the cleric roll a WIS
    save (`engine save`, DC 8 + proficiency bonus + WIS modifier,
    computed by hand); on a failure the target must spend its next turn
    moving away from the cleric rather than acting. This costs one use of
    channel_light for the day.
divine_domain:
  description: >
    Identity. At creation of this feature the player picks one domain
    focus, a lasting edge the GM applies by hand: Light (channel_light's
    sear option ignores half cover), Life (channel_light's mend option
    heals +2), War (--adv on the first weapon attack roll each
    encounter), or Knowledge (--adv on one Investigation or Arcana check
    per short rest). Note the pick on the sheet; it never changes.
greater_channel_light:
  description: >
    Numeric bump. Channel_light's sear die grows to 2d8 and its mend
    healing to 2d8 + WIS modifier, and the cleric gains a second use of
    channel_light per short rest.
divine_strike:
  description: >
    Numeric bump. Once per turn, when the cleric hits with a weapon
    attack, they may add 1d8 radiant damage to the hit by hand, on top of
    the weapon's normal damage from `engine attack`.
sacred_ward:
  description: >
    Numeric bump. Once per long rest, when the cleric or an ally within 6
    squares would drop to 0 HP, the cleric may spend a reaction to
    instead leave that creature at 1 HP — the GM overrides the drop-to-0
    result for that single hit.
improved_channel_light:
  description: >
    Numeric bump. Channel_light's sear die and mend die both grow to 3d8,
    and the cleric gains a third use of channel_light per short rest.
divine_intervention:
  description: >
    Capstone. Once per long rest, the cleric calls directly on their
    patron: the GM narrates a single dramatic, story-appropriate
    intervention on the party's behalf — a foe's weapon breaking, a door
    unbarring itself, a sudden calm in a storm — proportionate to the
    moment, GM's final call on the exact effect. Mechanically, this also
    restores all of the cleric's spent channel_light uses and one spent
    spell slot of the player's choice.
# ── Druid ────────────────────────────────────────────────────────────────
nature_bond:
  description: >
    Signature, GM-adjudicated. The druid speaks with beasts and the
    living land on friendly terms: ordinary animals default to curious or
    wary rather than hostile toward them, and the GM grants `engine check
    --adv` on any Nature or Survival check made about weather, terrain,
    plants, or animals.
wild_shape:
  description: >
    Signature, GM-run. Twice per short rest, as an action, the druid
    transforms into a beast form the GM has ready to run as a full stat
    block — at this level, a small-to-medium beast no bigger than a wolf
    or large cat (the GM sets AC/HP/attacks/speed from a comparable
    bestiary entry, or improvises one in that range). The druid's own HP
    total is set aside and unused while transformed; the beast form has
    its own HP pool (use its stat block's HP) and the druid reverts to
    their normal HP total, unchanged, when the form ends. The druid
    cannot cast spells while transformed, keeps their own INT/WIS/CHA and
    any features not tied to a body, and may end the transformation early
    as a free action. A transformation also ends automatically if the
    beast form drops to 0 HP; the druid takes no damage from that, but
    the wild shape use is spent.
verdant_step:
  description: >
    Identity. The druid moves through undergrowth like it isn't there:
    difficult terrain made of plants, vines, or thicket costs them no
    extra movement, and the GM grants `engine check --adv` on any Stealth
    check made while in natural surroundings with cover to use.
greater_wild_shape:
  description: >
    Spike. Wild_shape's available forms now include any beast up to the
    size of a bear or big cat, with proportionally larger AC/HP/attacks
    (the GM picks or improvises a stat block in that range) — and can
    also take to the water as anything up to a large fish or crocodile.
primal_strike:
  description: >
    Numeric bump. Whenever the druid hits with an attack while in wild
    shape or with a nature-flavored weapon like a quarterstaff, they may
    add 1d6 of the damage type suited to the moment (cold, fire,
    lightning, poison, or the beast's natural type — GM's call) to the
    hit by hand.
thousandfold_shape:
  description: >
    Numeric bump. Wild_shape may now be used three times per short rest,
    and while transformed the druid may take actions that require hands
    or speech that the beast form would normally lack — biting a scroll
    open, croaking out a single word — whenever it's plausible for the GM
    to allow it, since the druid's own mind still drives the body.
mastery_of_forms:
  description: >
    Spike. Wild_shape's available forms now include large beasts on the
    scale of a great cat, boar, or big raptor, and flying forms such as
    hawks or owls become available for the first time (see the targeting
    model's aloft/flying rules) — the GM sets the stat block accordingly.
primeval_awareness:
  description: >
    Numeric bump. Once per long rest, as an action, the druid reaches out
    through the land itself: the GM tells them, in general terms, what
    kinds of dangerous creatures (undead, aberrations, monstrous beasts)
    exist within roughly a day's travel of their current location, though
    not their exact number or position.
elder_wild_shape:
  description: >
    Spike. Wild_shape's available forms now include the largest beasts
    the GM is willing to run — bears, big cats at their biggest, or
    similarly imposing animals — and the druid may spend two uses of
    wild_shape at once to take on an especially powerful or magical beast
    form the GM designates for a one-off encounter.
apex_wild_shape:
  description: >
    Spike. Wild_shape now costs no uses at all to enter a form the druid
    has already taken at least once before today — only a brand-new form
    for the day still spends a use — and while transformed the druid's
    beast form gains +2 to its attack rolls and damage, layered on top of
    the stat block's own numbers.
archdruid:
  description: >
    Capstone. Wild_shape becomes effectively unlimited — the GM stops
    tracking uses per short rest, though a form still requires an action
    to enter — and the druid may remain transformed indefinitely with no
    time limit. Once per long rest, while in any beast form, the druid
    may also cast one known pri_ spell without reverting to their own
    body first, an exception to wild_shape's usual no-casting rule.
