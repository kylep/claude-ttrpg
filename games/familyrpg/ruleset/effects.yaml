# impact is guidance for the GM: apply it via --adv/--dis flags on rolls, or
# `engine effect add/remove`. Durations tick down each combat round.
# Effects marked "engine-enforced" are applied by the engine itself:
# prone, hidden, grappled, restrained, unconscious, poisoned, frightened, lit,
# dying, dead, and weakened change attack rolls, checks, and movement
# automatically — no --adv/--dis flags needed for those.
# description is GM-facing narration flavor; the engine ignores it
prone:
  impact: "engine-enforced: melee attacks against the prone creature get advantage, ranged attacks against it get disadvantage, its own attacks roll at disadvantage, and it crawls at double movement cost until `engine stand`"
  description: "The creature is flat on the ground amid its own dropped gear, scrambling for footing while the fight carries on above it."
hidden:
  impact: "engine-enforced: set by `engine hide` (needs cover from every hostile's line of sight); attacks from hiding get advantage and then reveal, attacks against the hidden creature get disadvantage, and whenever either side moves into the other's sight the stealth roll is contested against passive perception"
  description: "The creature has folded itself into shadow and held its breath; the fight has, for the moment, lost track of it."
grappled:
  impact: "engine-enforced: set by `engine grapple` (contested Athletics); the grappled creature cannot move until `engine escape` succeeds, the grappler releases or drops, or the pair is pulled apart"
  description: "A fist, jaw, or worse has closed on the creature; it can still fight, but it is going nowhere."
restrained:
  impact: "engine-enforced: the restrained creature cannot move, attacks against it get advantage, and its own attacks roll at disadvantage (GM applies and removes this one by hand — nets, vines, tangleroots)"
  description: "The creature is pinned in place by something with no interest in letting go — rope, root, or grasping mud."
unconscious:
  impact: "engine-enforced: creature cannot act, speak, or move; attacks against it resolve with advantage automatically"
  description: "The creature is slack and senseless on the ground, deaf to shouting and helpless against anything done to it."
poisoned:
  impact: "engine-enforced: the poisoned creature's attacks, checks, contests, and hide rolls all take disadvantage"
  description: "The creature is green-faced and clammy, its stomach churning and its eyes swimming at the edges."
frightened:
  impact: "engine-enforced: apply with `effect add --source <cause>`; the creature rolls attacks, checks, and contests at disadvantage while the source is alive and in its line of sight, and cannot willingly move closer to it; applied without a source it always bites"
  description: "The creature's nerve has cracked; it fights with one eye on the thing it fears and one foot already pointed at the door."
lit:
  impact: "engine-enforced: the creature carries its own light (a burning torch grants this on equip); it is plainly visible even in dark rooms, so darkness gives it no concealment and attackers no penalty against it"
  description: "Honest flame rides with the creature, throwing its shadow tall on every wall and telling the whole room exactly where it stands."
dying:
  impact: "engine-enforced: creature is unconscious at 0 hp and rolls a death save each round per recovery.yaml until it stabilizes, is healed, or dies"
  description: "The creature's breath comes shallow and thin; without a helping hand, each passing moment is a coin-toss it never agreed to."
dead:
  impact: "engine-enforced: creature is out of play; no further saves, healing, or actions apply to it (a world may restore it with `engine revive` — the toll is the `weakened` effect below)"
  description: "The creature is beyond wounds, beyond medicine, and beyond argument."
weakened:
  impact: "engine-enforced: the toll of being raised from death — the creature's attacks, checks, and contests all take disadvantage until it finishes a long rest, which clears it"
  description: "The creature walks and breathes again, but something did not come all the way back; its hands are slow and its thoughts keep drifting toward the cold place it just left."
blessed:
  impact: "GM gives the blessed creature +1d4 luck on attacks and saves, or grants --adv on one close roll instead; lasts until the scene ends or a long rest clears it"
  description: "A quiet warmth settles on the creature's shoulders and its hands go steady; blows seem to land right where they were aimed."
shielded:
  impact: "attacks against the shielded creature resolve at --dis, or the GM treats its AC as 2 higher for the encounter"
  description: "A pale ring of light drifts around the creature, tilting to meet blades and arrows a half-beat before they arrive."
raging:
  impact: "the raging creature deals +2 damage on melee hits and takes half damage from physical blows; the GM adds the bonus to `engine attack` damage by hand and halves incoming physical damage"
  description: "The creature's vision narrows to a red tunnel; pain stops mattering and every swing carries the whole weight of its fury."
focused:
  impact: "the focused creature has --adv on its next attack, check, or save, or the GM waives one distraction working against it; spent when used"
  description: "The world goes quiet at the edges and one thing — the lock, the leap, the killing blow — stands out sharp and slow and certain."
