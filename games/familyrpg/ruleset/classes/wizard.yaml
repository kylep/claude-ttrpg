name: wizard
description: "The bookish one who trades a strong arm for a stronger mind — every monster, every lock, every dark room has a spell for it, if you studied the right page."
hit_die: 6        # d6: starting HP, per-level HP gain, and short-rest healing
cast_attr: INT    # attribute behind spell attack rolls, save DCs, and CASTMOD
skill_choices: 2  # skills chosen from the list below at creation
attr_priority: [INT, DEX, CON, WIS, CHA, STR]  # standard array fills these high-to-low
skills: [arcana, investigation, nature, perception]  # from the 10-skill vocabulary
starting_gear: [dagger]  # item ids from ruleset/items.yaml
starting_gold: 20
levels:  # keys 1..20; features (feature ids), spells learned, spell slots {level: count, cumulative}
