cast_attr: WIS    # attribute behind spell attack rolls, save DCs, and CASTMOD
skill_choices: 2  # skills chosen from the list below at creation
attr_priority: [WIS, CON, STR, CHA, DEX, INT]  # standard array fills these high-to-low
skills: [medicine, persuasion, perception, survival]  # from the 10-skill vocabulary
starting_gear: [chain_shirt, mace]  # item ids from ruleset/items.yaml
starting_gold: 15
