name: Giant Bat
description: >
  A leather-winged bat the size of a large dog, wheeling through cave
  darkness on silent wingbeats; it strafes in from above, bites, and banks
  away before anyone can pin it against a wall.
ac: 13     # armor class attacks must meet or beat
hp: 6      # hit points per spawned instance
speed: 6   # grid squares per combat turn (wing-beats let it fight aloft)
attributes: {STR: 6, DEX: 16, CON: 8, INT: 2, WIS: 12, CHA: 4}  # DEX drives initiative
attacks: [{name: bite, attack_mod: 4, damage: "1d4+1", range: 1, kind: melee}]  # range in squares
xp: 50     # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: null, items: []}  # rolled per instance at encounter end, into the party pool
flying: true  # enables aloft/reach targeting rules
difficulty: easy  # GM guidance only
