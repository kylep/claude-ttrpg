name: Giant Bat
description: >
  A leather-winged bat the size of a large dog, wheeling through cave
  darkness on silent wingbeats; it strafes in from above, bites, and banks
  away before anyone can pin it against a wall.
ac: 13     # armor class attacks must meet or beat
hp: 6      # hit points per spawned instance
speed: 6   # grid squares per combat turn (wing-beats let it fight aloft)
attributes: {STR: 6, DEX: 16, CON: 8, INT: 2, WIS: 12, CHA: 4}  # DEX drives initiative
attacks: [{name: bite, attack_mod: 4, damage: "1d4+1", range: 1, kind: melee}]  # range in squares
xp: 125    # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: null, items: []}  # rolled per instance at encounter end, into the party pool
flying: true  # enables aloft/reach targeting rules
difficulty: easy  # GM guidance only
appearance: >
  Giant bats are common cave-bats grown to the size of a large dog, with a
  leathery wingspan wider than a person is tall. The membrane wings are
  stretched over long finger-bones and fold tight against a furred, mouse-
  brown body when at rest. The face is a snub-snouted, wrinkled grimace
  dominated by huge translucent ears and small, weak eyes; they hunt by
  sound as much as sight, filling the dark with clicks and shrieks pitched
  at the edge of hearing. Needle teeth line the little mouth. They are true
  flyers, at home wheeling through cavern-black on silent wings, and they
  roost in shrieking colonies overhead, dropping into a flapping,
  disorienting swarm when disturbed.
image: art/bestiary/giant_bat.png
habitat:  # world locations found in; coined minor spots tracked in content/lore/locations.yaml
  - Duskhold
  - Stonewatch Mine-Tunnels
  - Ironford Deep-Tunnels
