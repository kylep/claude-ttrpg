name: Cultist
description: >
  An ordinary person who fell in with the wrong hooded crowd and now does its
  errands — robbing graves, daubing sigils, standing guard over things better
  left alone; brave only in a mob, and quick to run once the leader falls.
ac: 12     # armor class attacks must meet or beat
hp: 9      # hit points per spawned instance
speed: 6   # grid squares per combat turn
attributes: {STR: 11, DEX: 12, CON: 10, INT: 10, WIS: 11, CHA: 10}  # DEX drives initiative
attacks:  # range in squares; a single ritual dagger
  - {name: ritual dagger, attack_mod: 3, damage: "1d4+1", range: 1, kind: melee}
xp: 25     # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: "1d6", items: []}  # rolled per instance at encounter end, into the party pool
difficulty: easy  # GM guidance only — a threat mostly in numbers, or with a fanatic leading
appearance: >
  A cultist is an unremarkable person in a dark hooded robe — the sort of face
  you'd pass in any market without a second look, which is rather the point. The
  robe is plain homespun dyed black or deep red, cinched with a cord and marked
  at the breast with a single crude painted sigil; beneath it are ordinary
  clothes, a farmhand's or a townsman's. The hood is usually up, throwing the
  face into shadow, though what shows is nervous and over-earnest more than
  wicked. They carry a short ritual dagger and sometimes a guttering candle or a
  daubing-brush and pot. Wingless and unhardened, they hold together only in a
  crowd and behind a bolder leader; alone and cornered, most would rather bolt
  than fight.
image: art/bestiary/cultist.png
habitat:  # world locations found in; coined minor spots tracked in content/lore/locations.yaml
  - hidden shrines beneath Duskhold
  - a cellar-chapel in a Great Plains town
  - the Barrow-downs on ritual nights
