name: Gray Ooze
description: >
  A slow, dull-colored blob that passes for a puddle or a slick of wet stone
  until something steps in it; it has no face, no fear, and no interest in
  anything but the meal directly in front of it.
ac: 9      # armor class attacks must meet or beat (a shapeless blob is easy to hit)
hp: 25     # hit points per spawned instance
speed: 3   # grid squares per combat turn
attributes: {STR: 12, DEX: 6, CON: 16, INT: 1, WIS: 6, CHA: 2}  # DEX drives initiative
attacks: [{name: corrosive touch, attack_mod: 5, damage: "2d6+1", range: 1, kind: melee}]  # range in squares
xp: 300    # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: null, items: []}  # rolled per instance at encounter end, into the party pool
difficulty: standard  # GM guidance only
