name: Troll
description: >
  A gaunt, rubbery-skinned horror with long raking claws and wounds that
  seem to knit shut between blows; it is not fast, but it does not tire,
  and it does not stay down as long as it should.
ac: 16     # armor class attacks must meet or beat
hp: 84     # hit points per spawned instance
speed: 8   # grid squares per combat turn
attributes: {STR: 18, DEX: 13, CON: 20, INT: 6, WIS: 9, CHA: 7}  # DEX drives initiative
attacks:  # range in squares; two raking claw strikes per turn
  - {name: claw, attack_mod: 7, damage: "2d6+4", range: 1, kind: melee}
  - {name: claw, attack_mod: 7, damage: "2d6+4", range: 1, kind: melee}
xp: 2200   # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: "3d6", items: []}  # rolled per instance at encounter end, into the party pool
difficulty: tough  # GM guidance only
appearance: >
  A troll is a lanky, loose-limbed giant, taller than an ogre but gaunt
  where the ogre is bulky, all long bones and sagging rubbery hide. Its skin
  is a sickly moss-green or grey, hanging in warty folds, and its arms reach
  nearly to the ground, ending in hooked black claws. A long drooping nose
  and a wide mouth of snaggled teeth sit under small, dull, deep-set eyes.
  Lank weeds of hair trail from its scalp. What makes it a nightmare is not
  its look but its flesh: wounds close and knit shut between one blow and
  the next, so it shrugs off damage that would drop anything else.
  Earthbound and shambling, it never seems to tire and never stays down as
  long as it should.
image: art/bestiary/troll.png
