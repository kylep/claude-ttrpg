name: Boar
description: >
  A wild pig with a bad temper and a pair of curved tusks, common in field and
  wood and dangerous when cornered or protecting young; it lowers its head and
  charges, and a full-tilt boar can knock a grown fighter flat.
ac: 11     # armor class attacks must meet or beat
hp: 13     # hit points per spawned instance
speed: 8   # grid squares per combat turn (fast in a straight-line charge)
attributes: {STR: 13, DEX: 11, CON: 12, INT: 2, WIS: 9, CHA: 5}  # DEX drives initiative
attacks:  # range in squares; a goring tusk, worst at the end of a charge
  - {name: tusk, attack_mod: 3, damage: "1d6+1", range: 1, kind: melee}  # a running charge may knock the target prone — GM's call
xp: 50     # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: null, items: []}  # good eating, not coin; rolled empty at encounter end
difficulty: easy  # GM guidance only — a fine first fight, or dinner
appearance: >
  A wild boar is a stocky, heavy-shouldered pig standing about knee-to-waist
  high, built low and forward with most of its weight and muscle bunched over the
  front legs. Its hide is a bristly grey-brown to near-black, coarse as a stiff
  brush, thickening into a short mane along the spine that rises when it's angry.
  The head is long and wedge-shaped, ending in a flat, questing snout, with small
  dark eyes and a pair of curved ivory tusks jutting up from the lower jaw. Short,
  sturdy legs end in cloven hooves. Earthbound and quick over open ground, it
  trots and roots with deceptive calm, then drops its head, digs in, and comes at
  a threat in a straight, snorting rush.
image: art/bestiary/boar.png
habitat:  # world locations found in; coined minor spots tracked in content/lore/locations.yaml
  - the Great Plains hedgerows and fields
  - the edges of the Deepwoods
  - the scrubland near Millbrook
