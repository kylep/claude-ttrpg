name: Goblin Archer
description: >
  A goblin that has learned to stay out of arm's reach and let a short bow do
  the talking; it perches at the back of the pack, picks a target, and darts
  away the instant anyone closes the distance.
ac: 13     # armor class attacks must meet or beat
hp: 7      # hit points per spawned instance
speed: 6   # grid squares per combat turn
attributes: {STR: 8, DEX: 14, CON: 10, INT: 10, WIS: 8, CHA: 8}  # DEX drives initiative
attacks: [{name: short bow, attack_mod: 4, damage: "1d6+2", range: 16, kind: ranged}]  # range in squares
xp: 200    # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: "1d6", items: []}  # rolled per instance at encounter end, into the party pool
difficulty: easy  # GM guidance only
habitat:  # world locations found in; coined minor spots tracked in content/lore/locations.yaml
  - the Free Road hedgerows
  - the Deepwoods edge
  - Wasteland raider-trails
