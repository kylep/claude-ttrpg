name: Skeleton
description: >
  A cobweb-hung skeleton clutching a rusted blade, moving with a stiff,
  clattering gait and no fear at all; it fights until it is in pieces, not a
  moment sooner.
ac: 13     # armor class attacks must meet or beat
hp: 16     # hit points per spawned instance
speed: 6   # grid squares per combat turn
attributes: {STR: 12, DEX: 14, CON: 12, INT: 6, WIS: 8, CHA: 5}  # DEX drives initiative
attacks: [{name: rusted shortsword, attack_mod: 4, damage: "1d6+2", range: 1, kind: melee}]  # range in squares
xp: 200    # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: null, items: []}  # rolled per instance at encounter end, into the party pool
difficulty: standard  # GM guidance only
appearance: >
  A skeleton is the bare bones of the dead pulled upright and set marching
  by dark magic — no flesh, no organs, just a clattering frame of yellowed,
  age-browned bone held together by nothing anyone can see. Cobwebs and
  grave-dust cling to it, and scraps of the rotted clothing or rusted armor
  it was buried in still hang off the ribs and hips. It has no eyes, yet the
  empty sockets seem to track you, sometimes lit by a faint cold spark. It
  moves in a stiff, jerking, tireless gait and makes no sound but the dry
  rattle of bone on bone. Earthbound and mindless, it feels no fear and no
  pain, and it swings its rusted blade with the same blank patience whether
  it is whole or falling to pieces.
