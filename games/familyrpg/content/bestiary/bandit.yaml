name: Bandit
description: >
  A road-worn opportunist in mismatched leather, more interested in your
  coin purse than a fair fight; it presses hard while the numbers favor it
  and looks for the treeline the moment they stop.
ac: 13     # armor class attacks must meet or beat
hp: 15     # hit points per spawned instance
speed: 6   # grid squares per combat turn
attributes: {STR: 12, DEX: 13, CON: 12, INT: 10, WIS: 10, CHA: 10}  # DEX drives initiative
attacks: [{name: shortsword, attack_mod: 4, damage: "1d6+2", range: 1, kind: melee}]  # range in squares
xp: 200    # party pool sized for 4 PCs; split evenly at `engine encounter end`
loot: {gold: "2d6", items: []}  # rolled per instance at encounter end, into the party pool
difficulty: standard  # GM guidance only
appearance: >
  Bandits are ordinary folk gone to the roadside — deserters, failed
  farmers, and hard-luck drifters who found robbing travelers easier than
  honest work. They dress in a mismatched patchwork of worn leather, dented
  iron caps, and cloaks gone the color of the road, with a kerchief or hood
  pulled up to hide the face. Build and coloring run the full human range;
  what marks them is the wary, hungry look and the well-used weapons — a
  nicked shortsword, a hand crossbow, a cudgel — kept closer than anything
  else they own. Wingless and earthbound, they favor numbers and ambush over
  any fair fight, and melt back into hedge and ditch the moment the odds
  turn against them.
image: art/bestiary/bandit.png
