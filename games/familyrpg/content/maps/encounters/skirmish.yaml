id: skirmish
name: Roadside Skirmish
grid: {width: 14, height: 8}  # squares; [0,0] is top-left
terrain:
  - {type: wall, cells: [[5, 0], [5, 1], [9, 6], [9, 7]]}          # impassable
  - {type: difficult, cells: [[6, 3], [6, 4], [7, 4], [8, 3]]}     # +1 movement cost to enter
monsters:  # type = bestiary id; instances get numbered ids (goblin-1, goblin-2, ...)
  - {type: goblin, pos: [8, 2]}
  - {type: goblin, pos: [9, 5]}
  - {type: goblin_archer, pos: [12, 4]}
pc_spawns: [[1, 3], [1, 4], [2, 3], [2, 4]]  # PCs seated here in party order at encounter start
