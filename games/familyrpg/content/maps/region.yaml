# nodes: travel destinations; coords are approximate map placement, terrain is flavor
# edges: undirected routes; hours advance the world clock on `engine travel`
# description: shown on the location card in the live viewer; keep to 1-2 sentences
nodes:
  greenhollow: {name: Greenhollow, coords: [0, 0], terrain: settlement,
    description: "A snug village of green-shuttered cottages around a duck pond and a well, where everyone knows your name and half of them are your cousin. The Kettle & Cat serves stew and news in equal measure."}
  kings_road: {name: The King's Road, coords: [4, 1], terrain: road,
    description: "The broad packed-earth road that ties the valley to the wider realm: milestones, hedgerows, and the occasional overturned cart that turns out to be bait."}
  hollow_wood: {name: Hollow Wood, coords: [7, 3], terrain: forest,
    description: "A tangle of old oaks and green shade just off the road, pretty by day and full of small mean things by dusk; the village children are told to be home before the light goes."}
edges:
  - {between: [greenhollow, kings_road], hours: 2}
  - {between: [kings_road, hollow_wood], hours: 3}
