<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280">
  <!-- Young Dragon: a rising terror circling a crag, wings spread, head swung
       low to loose a cone of fire on the heroes who brace behind their shields.
       Scary but beatable. House cartography / illustration style. -->

  <!-- sky ground -->
  <rect x="0" y="0" width="420" height="280" fill="#e8dcc0"/>

  <!-- warm dusk band low on the sky -->
  <path d="M-6,150 C 90,140 200,138 300,146 C 350,150 390,150 426,146 L426,214 L-6,214 Z"
        fill="#e2cca4"/>
  <path d="M-6,182 C 90,174 210,172 320,178 C 366,181 400,181 426,178 L426,214 L-6,214 Z"
        fill="#ddc196"/>

  <!-- upper cloud masses -->
  <path d="M-6,-6 L426,-6 L426,30 C 380,42 336,26 288,38 C 238,50 196,32 150,44 C 102,56 50,38 -6,52 Z"
        fill="#c6b794"/>
  <path d="M-6,44 C 60,34 128,52 196,40 C 262,30 330,48 426,34 L426,66 C 350,78 292,58 232,70 C 172,80 92,66 -6,80 Z"
        fill="#d8c9a6"/>
  <!-- lower drifting cloud, behind the dragon -->
  <path d="M262,96 C 300,88 348,92 386,86 C 404,83 418,84 426,82 L426,118 C 388,124 342,118 300,122 C 282,124 268,120 258,116 C 256,108 258,100 262,96 Z"
        fill="#d8c9a6"/>

  <!-- distant mountain range across the valley -->
  <path d="M-6,214 L28,190 L54,204 L86,178 L118,206 L150,184 L188,208 L214,196 L214,224 L-6,224 Z"
        fill="#9aa47e"/>
  <path d="M214,224 L214,198 L246,180 L280,208 L312,186 L346,210 L378,190 L410,208 L426,198 L426,224 Z"
        fill="#8a9670"/>
  <!-- valley floor haze -->
  <path d="M-6,214 C 100,208 220,210 320,214 C 366,216 400,215 426,213 L426,236 L-6,236 Z"
        fill="#b6ad8c"/>

  <!-- a far hamlet, one roof aflame, thin smoke rising (the dragon's work) -->
  <g>
    <rect x="330" y="204" width="9" height="8" fill="#8a7a5f"/>
    <rect x="342" y="206" width="7" height="6" fill="#9c8b6c"/>
    <path d="M329,204 L334,199 L340,204 Z" fill="#a3543c"/>
    <path d="M341,206 L345,202 L349,206 Z" fill="#8a7a5f"/>
    <path d="M334,199 C 338,192 334,186 338,180 C 342,174 338,168 342,162"
          fill="none" stroke="#8a7a5f" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M336,200 C 335,196 333,193 334,190" fill="none" stroke="#a33d2f" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- ================= THE DRAGON ================= -->

  <!-- far (left) wing, drawn behind the body -->
  <path d="M198,112 L54,58 C 62,86 72,100 84,118 C 100,138 108,148 120,156
           C 136,166 148,170 160,172 C 178,166 190,160 198,150 Z"
        fill="#bd6b46" stroke="#4a3527" stroke-width="2"/>
  <!-- far wing membrane shading -->
  <path d="M198,112 L54,58 C 64,84 74,98 86,114 C 78,118 70,122 64,128
           C 66,104 68,80 66,64 Z" fill="#a9583a"/>
  <!-- far wing finger struts -->
  <g stroke="#4a3527" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M54,58 L84,118"/>
    <path d="M54,58 L120,156"/>
    <path d="M54,58 L160,172"/>
  </g>

  <!-- right wing, drawn behind the body -->
  <path d="M230,112 L374,58 C 366,86 356,100 344,118 C 328,138 320,148 308,156
           C 292,166 280,170 268,172 C 250,166 238,160 230,150 Z"
        fill="#bd6b46" stroke="#4a3527" stroke-width="2"/>
  <path d="M230,112 L374,58 C 364,84 354,98 342,114 C 350,118 358,122 364,128
           C 362,104 360,80 362,64 Z" fill="#a9583a"/>
  <g stroke="#4a3527" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M374,58 L344,118"/>
    <path d="M374,58 L308,156"/>
    <path d="M374,58 L268,172"/>
  </g>

  <!-- tail, curling down and right behind the body -->
  <path d="M234,168 C 262,180 290,192 310,206 C 326,217 340,214 346,200
           C 348,193 346,187 342,184 C 340,192 332,196 322,192
           C 306,184 282,172 258,162 C 250,160 240,162 234,168 Z"
        fill="#a3543c" stroke="#4a3527" stroke-width="2"/>
  <!-- tail barb, a clean spade fin -->
  <path d="M340,196 C 350,186 362,182 366,186 C 360,190 354,196 350,204
           C 348,200 344,198 340,196 Z"
        fill="#c9bda3" stroke="#4a3527" stroke-width="1.4"/>

  <!-- hind legs and taloned feet -->
  <path d="M196,168 C 190,182 184,196 178,206 C 176,210 178,214 182,214
           C 188,208 196,196 204,182 C 202,176 200,172 196,168 Z"
        fill="#8f4632" stroke="#4a3527" stroke-width="1.8"/>
  <g stroke="#4a3527" stroke-width="1.3" fill="#efe6d2">
    <path d="M178,206 L172,216 L177,214 L179,220 L182,213 L186,218 L184,209 Z"/>
  </g>
  <path d="M240,170 C 250,184 258,198 264,208 C 266,212 264,216 260,215
           C 252,208 242,196 234,182 C 236,176 238,172 240,170 Z"
        fill="#8f4632" stroke="#4a3527" stroke-width="1.8"/>
  <g stroke="#4a3527" stroke-width="1.3" fill="#efe6d2">
    <path d="M264,208 L272,216 L266,214 L266,221 L262,214 L257,218 L260,210 Z"/>
  </g>

  <!-- body -->
  <path d="M188,106 C 182,94 202,88 216,90 C 234,90 248,100 245,118
           C 251,134 250,152 240,168 C 232,180 222,186 214,186
           C 205,186 194,180 187,167 C 178,150 178,124 188,106 Z"
        fill="#a3543c" stroke="#4a3527" stroke-width="2.4"/>
  <!-- shaded back and haunch, on the away side -->
  <path d="M245,118 C 251,134 250,152 240,168 C 234,174 228,178 222,181
           C 231,162 236,140 235,120 C 234,110 228,102 220,98
           C 232,96 244,104 245,118 Z" fill="#8f4632"/>
  <!-- scaled-shoulder texture -->
  <g stroke="#8f4632" stroke-width="0.9" fill="none">
    <path d="M206,108 C 214,112 220,118 222,126"/>
    <path d="M199,116 C 207,120 213,128 215,136"/>
    <path d="M219,110 C 227,116 231,124 232,134"/>
  </g>
  <!-- belly / chest plates along the underside facing the fire -->
  <path d="M190,122 C 184,140 186,160 195,176 C 200,182 206,184 210,183
           C 203,172 199,156 199,140 C 199,132 200,126 203,120
           C 198,118 193,119 190,122 Z"
        fill="#cdb98d" stroke="#4a3527" stroke-width="1.3"/>
  <g stroke="#4a3527" stroke-width="0.8" fill="none">
    <path d="M190,134 C 195,131 200,131 202,134"/>
    <path d="M188,147 C 194,144 199,144 201,147"/>
    <path d="M189,160 C 195,157 200,158 203,160"/>
    <path d="M193,172 C 198,169 203,170 206,172"/>
  </g>
  <!-- dorsal spikes along the back -->
  <g fill="#c9bda3" stroke="#4a3527" stroke-width="1.2">
    <path d="M240,116 L250,110 L244,124 Z"/>
    <path d="M244,132 L255,128 L247,142 Z"/>
    <path d="M245,150 L255,148 L246,160 Z"/>
  </g>

  <!-- neck, arching down toward the head -->
  <path d="M196,102 C 182,92 164,92 152,104 C 142,114 138,128 140,142
           C 148,138 156,132 162,124 C 170,114 182,110 196,116 Z"
        fill="#a3543c" stroke="#4a3527" stroke-width="2.2"/>
  <path d="M141,140 C 150,136 158,130 164,124 C 172,116 184,112 196,116
           C 186,116 176,120 168,127 C 160,134 151,140 143,143 Z" fill="#8f4632"/>
  <!-- neck spikes -->
  <g fill="#c9bda3" stroke="#4a3527" stroke-width="1.1">
    <path d="M186,98 L192,90 L192,102 Z"/>
    <path d="M172,96 L176,88 L179,99 Z"/>
    <path d="M159,100 L161,92 L166,102 Z"/>
  </g>

  <!-- head: skull, jaws open toward the fire -->
  <!-- upper skull + snout -->
  <path d="M152,106 C 140,110 128,120 118,134 C 114,140 116,145 122,144
           C 130,140 140,136 148,132 C 156,126 160,116 158,108
           C 157,105 154,104 152,106 Z"
        fill="#a3543c" stroke="#4a3527" stroke-width="2"/>
  <!-- brow shade -->
  <path d="M152,106 C 143,110 133,118 125,129 C 132,127 141,123 148,119
           C 155,113 158,109 158,108 C 157,105 154,104 152,106 Z" fill="#8f4632"/>
  <!-- lower jaw, dropped open -->
  <path d="M147,131 C 145,142 140,152 132,160 C 128,163 130,167 134,165
           C 142,159 149,150 152,140 C 152,135 150,132 147,131 Z"
        fill="#8f4632" stroke="#4a3527" stroke-width="1.8"/>
  <!-- open maw / throat glow -->
  <path d="M124,142 C 130,140 138,138 146,136 C 148,142 146,148 141,153
           C 135,150 128,147 124,142 Z" fill="#7a2a20"/>
  <path d="M128,142 C 133,141 139,140 144,139 C 145,143 143,147 140,150
           C 135,148 131,145 128,142 Z" fill="#c46a2e"/>
  <!-- teeth -->
  <g fill="#efe6d2">
    <path d="M124,141 L127,146 L130,141 Z"/>
    <path d="M132,140 L135,145 L138,140 Z"/>
    <path d="M126,145 L129,150 L132,146 Z"/>
    <path d="M134,144 L137,149 L140,145 Z"/>
  </g>
  <!-- horns swept back off the skull -->
  <path d="M156,108 C 168,100 182,96 194,96 C 184,102 174,110 165,120
           C 161,117 157,113 156,108 Z"
        fill="#d8ccb0" stroke="#4a3527" stroke-width="1.6"/>
  <path d="M150,108 C 158,100 168,96 176,94 C 169,100 162,108 156,117
           C 152,115 150,112 150,108 Z"
        fill="#c9bda3" stroke="#4a3527" stroke-width="1.4"/>
  <!-- eye, ember-lit and fierce -->
  <path d="M142,116 C 146,114 150,116 150,120 C 150,124 146,125 143,123
           C 141,121 140,118 142,116 Z" fill="#efe6d2" stroke="#4a3527" stroke-width="1"/>
  <path d="M145,117 C 148,117 149,120 147,122 C 145,123 143,121 144,119 Z" fill="#a33d2f"/>
  <circle cx="146" cy="120" r="1" fill="#241c14"/>
  <!-- small horn spike under jaw -->
  <path d="M138,150 L134,158 L142,153 Z" fill="#c9bda3" stroke="#4a3527" stroke-width="1"/>

  <!-- near foreleg reaching forward, over the chest -->
  <path d="M190,140 C 182,150 176,162 172,174 C 170,178 174,182 178,180
           C 184,170 192,158 200,150 C 198,145 195,141 190,140 Z"
        fill="#a3543c" stroke="#4a3527" stroke-width="2"/>
  <g stroke="#4a3527" stroke-width="1.3" fill="#efe6d2">
    <path d="M172,174 L164,182 L171,180 L170,187 L176,181 L180,186 L178,177 Z"/>
  </g>

  <!-- ================= THE FIRE ================= -->
  <!-- cone of breath from the maw down toward the crag -->
  <path d="M126,150 C 108,166 90,188 76,214 C 68,228 62,242 60,252
           C 78,250 96,246 112,240 C 118,222 126,200 136,180
           C 142,168 140,158 132,152 C 130,150 128,150 126,150 Z"
        fill="#a33d2f"/>
  <path d="M126,152 C 110,168 96,188 84,210 C 78,222 74,234 72,244
           C 86,242 100,238 112,232 C 118,214 124,196 132,180
           C 137,169 136,160 130,155 Z" fill="#c8642c"/>
  <path d="M126,155 C 114,169 102,186 92,204 C 87,214 84,224 83,232
           C 94,230 105,226 114,221 C 119,204 124,188 130,175
           C 133,166 132,159 128,157 Z" fill="#e0953c"/>
  <path d="M125,158 C 116,170 107,184 100,198 C 96,206 94,214 94,220
           C 102,218 110,214 116,210 C 120,196 124,182 128,171
           C 130,164 129,160 126,159 Z" fill="#f0d59a"/>
  <!-- flame tongues licking at the bottom -->
  <g fill="#a33d2f">
    <path d="M62,252 C 58,244 54,238 56,230 C 60,238 64,242 66,250 Z"/>
    <path d="M84,248 C 82,240 80,232 84,224 C 86,234 90,240 90,248 Z"/>
    <path d="M104,242 C 104,234 104,226 108,220 C 110,230 112,236 110,244 Z"/>
  </g>
  <!-- ember sparks trailing off -->
  <g fill="#c8642c">
    <circle cx="66" cy="228" r="1.4"/>
    <circle cx="78" cy="220" r="1.1"/>
    <circle cx="92" cy="214" r="1.3"/>
    <circle cx="70" cy="240" r="1"/>
    <circle cx="100" cy="230" r="1"/>
  </g>

  <!-- ================= FOREGROUND CRAG + HEROES ================= -->
  <!-- near crag the heroes stand on, dark against the valley -->
  <path d="M-6,258 C 30,246 66,242 96,246 C 118,249 130,252 138,258
           C 130,264 118,268 96,270 C 60,272 24,270 -6,272 Z"
        fill="#4a3527" stroke="#241c14" stroke-width="1.6"/>
  <path d="M-6,270 C 40,262 96,264 138,270 L138,286 L-6,286 Z" fill="#241c14"/>
  <!-- rock facets -->
  <g stroke="#241c14" stroke-width="1" fill="none">
    <path d="M14,258 L30,252 L40,260"/>
    <path d="M56,256 L72,250 L84,257"/>
    <path d="M96,257 L112,252 L124,260"/>
  </g>

  <!-- two heroes bracing behind shields, rim-lit by the fire -->
  <!-- hero 1: shield raised -->
  <g>
    <path d="M40,254 C 39,246 42,240 47,239 C 52,240 54,246 53,254 Z"
          fill="#241c14"/>
    <circle cx="46.5" cy="236" r="3.4" fill="#241c14"/>
    <!-- round shield catching ember light -->
    <path d="M52,242 C 60,240 66,246 65,254 C 58,256 52,252 52,242 Z"
          fill="#3a2b1f" stroke="#a33d2f" stroke-width="1.3"/>
    <!-- spear -->
    <path d="M40,256 L36,228" stroke="#241c14" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M36,228 L34,222 L38,227 Z" fill="#c9bda3"/>
  </g>
  <!-- hero 2: sword up, smaller/behind -->
  <g>
    <path d="M74,256 C 73,249 76,244 80,243 C 85,244 86,249 85,256 Z"
          fill="#241c14"/>
    <circle cx="79.5" cy="240" r="3" fill="#241c14"/>
    <path d="M85,250 L92,236" stroke="#241c14" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M92,236 L90,229 L96,234" fill="none" stroke="#c9bda3" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- a wind-bent pine on the crag edge, right side, for depth -->
  <path d="M150,262 L150,240 L142,244 L150,222 L144,224 L152,206 L162,224 L156,222
           L164,244 L156,240 L156,262 Z" fill="#3a4a2c" stroke="#241c14" stroke-width="1.2"/>

  <!-- parchment margins masking overspill -->
  <rect x="-12" y="-12" width="444" height="18" fill="#e8dcc0"/>
  <rect x="-12" y="274" width="444" height="18" fill="#e8dcc0"/>
  <rect x="-12" y="-12" width="18" height="304" fill="#e8dcc0"/>
  <rect x="414" y="-12" width="18" height="304" fill="#e8dcc0"/>
  <!-- frame -->
  <rect x="6" y="6" width="408" height="268" rx="5" fill="none" stroke="#4a3527" stroke-width="2"/>
</svg>
