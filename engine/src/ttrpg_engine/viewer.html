<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claude-ttrpg</title>
<style>
  :root {
    --ink: #171412; --surface: #211d19; --edge: #383028;
    --parchment: #e8e0d2; --muted: #9c917f; --ember: #d9973b;
    --blood: #b8453c; --moss: #7d9b5e; --gold: #c9a86a;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html { background: var(--ink); }
  body {
    color: var(--parchment); font-family: var(--serif);
    min-height: 100vh; line-height: 1.55;
  }
  a { color: var(--ember); }

  header {
    display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
    padding: .7rem 1.2rem; border-bottom: 1px solid var(--edge);
    position: sticky; top: 0; background: var(--ink); z-index: 2;
  }
  header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: .02em; }
  header .where { color: var(--muted); font-size: .85rem; }
  header .pulse {
    margin-left: auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--moss); opacity: .3; transition: opacity .2s, box-shadow .2s;
    flex: none;
  }
  header .pulse.beat { opacity: 1; box-shadow: 0 0 7px var(--moss); }
  header .pulse.stale { background: var(--blood); opacity: .9; box-shadow: none; }
  header .lens {
    margin-left: .6rem; font-family: var(--mono); font-size: .7rem;
    color: var(--ink); background: var(--gold); padding: .15rem .5rem;
    border-radius: 2px; letter-spacing: .08em;
  }
  header .lens.gm { background: var(--blood); color: var(--parchment); }
  header #gloss-btn {
    margin-left: auto; font-family: var(--mono); font-size: .72rem;
    color: var(--gold); background: transparent; border: 1px solid var(--gold);
    border-radius: 4px; padding: .2rem .7rem; cursor: pointer; letter-spacing: .04em;
  }
  header #gloss-btn:hover { background: var(--gold); color: var(--ink); }

  .table { display: grid; grid-template-columns: minmax(0, 7fr) minmax(320px, 4fr);
           gap: 1.4rem; padding: 1.2rem; max-width: 1500px; margin: 0 auto;
           align-items: start; }
  /* the tactical rail stays pinned while the story scrolls — never lose the map */
  aside { position: sticky; top: 3.4rem; align-self: start;
          max-height: calc(100vh - 4.6rem); overflow-y: auto; padding-right: .3rem; }
  @media (max-width: 900px) {
    .table { grid-template-columns: 1fr; }
    aside { position: static; max-height: none; overflow: visible; order: 1; }
    main { order: 2; }   /* on a phone the map comes first, story below */
  }

  /* ---- empty-state hero: a title card, not a black void ------------------ */
  .hero { display: flex; flex-direction: column; justify-content: center;
          align-items: center; min-height: 58vh; text-align: center; gap: 1rem; }
  .hero[hidden] { display: none; }   /* [hidden] must beat the flex display */
  .hero h2 { font-size: 2.3rem; font-weight: 600; letter-spacing: .01em; }
  .hero .sub { color: var(--muted); font-family: var(--mono); font-size: .8rem;
               letter-spacing: .06em; }
  .hero .medallions { display: flex; gap: 1.1rem; flex-wrap: wrap;
                      justify-content: center; margin: .4rem 0; }
  .hero .med { display: flex; flex-direction: column; align-items: center; gap: .35rem;
               width: 5.2rem; }
  .hero .med .disc { width: 3rem; height: 3rem; border-radius: 50%;
                     background: var(--edge); border: 1px solid var(--gold);
                     display: grid; place-items: center; font-size: 1.25rem;
                     color: var(--gold); }
  .hero .med .who { font-size: .72rem; color: var(--parchment); }
  .hero .med .sub2 { font-size: .64rem; color: var(--muted); }
  .hero .cta { color: var(--muted); font-style: italic; max-width: 26rem; }

  /* ---- the story: a manuscript column ---------------------------------- */
  #story { max-width: 46rem; }
  #story .feed { border-left: 2px solid var(--ember); padding: .2rem 0 .2rem 1.4rem; }
  .beat { margin: 0 0 1.1rem; }
  .beat.gm p { margin: 0 0 .7rem; }
  .beat.gm :is(h1,h2,h3) { font-size: 1rem; color: var(--gold); margin: .9rem 0 .4rem; }
  .beat.gm table { border-collapse: collapse; font-family: var(--mono); font-size: .78rem; margin: .6rem 0; }
  .beat.gm :is(td,th) { border: 1px solid var(--edge); padding: .25rem .55rem; }
  .beat.gm code, .beat.gm pre { font-family: var(--mono); font-size: .82rem;
    background: var(--surface); border-radius: 3px; padding: .1rem .3rem; }
  .beat.gm pre { padding: .6rem .8rem; overflow-x: auto; }
  .beat.gm blockquote { border-left: 2px solid var(--edge); color: var(--muted);
    padding-left: .8rem; margin: .6rem 0; }
  /* a player's spoken line is a line in the script */
  .beat.action { margin: 1.4rem 0; }
  .beat.action .speaker { font-variant: small-caps; letter-spacing: .12em;
    color: var(--ember); font-size: .85rem; cursor: pointer; }
  .beat.action .speaker:hover { color: var(--gold); }
  .beat.action .line { color: var(--gold); font-style: italic; }
  .beat.action .line p { display: inline; margin: 0; }
  .beat.action .line::before { content: "— "; }
  @media (prefers-reduced-motion: no-preference) {
    .beat.new { animation: settle .5s ease-out; }
    @keyframes settle { from { opacity: 0; transform: translateY(4px); } }
  }
  #story .empty { color: var(--muted); font-style: italic; }

  /* ---- scene headers: chapter breaks ------------------------------------ */
  .beat.scene { text-align: center; margin: 2.2rem 0 1.6rem; }
  .beat.scene .rule { width: 5rem; height: 1px; background: var(--edge); margin: .65rem auto; }
  .beat.scene .title { font-size: 1.5rem; color: var(--gold); letter-spacing: .02em; }
  .beat.scene .sub { color: var(--muted); font-size: .78rem; font-variant: small-caps;
                     letter-spacing: .16em; margin-top: .1rem; }

  /* ---- milestones: quiet lines between beats ---------------------------- */
  .beat.system, .beat.combat { display: flex; align-items: center; gap: .8rem;
    margin: 1.4rem 0; font-size: .82rem; color: var(--muted); }
  .beat.system::before, .beat.system::after,
  .beat.combat::before, .beat.combat::after {
    content: ""; flex: 1; height: 1px; background: var(--edge); }
  .beat.system .mid p, .beat.combat .mid p { margin: 0; display: inline; }
  .beat.combat .mid { color: var(--ember); font-family: var(--mono);
    font-size: .74rem; letter-spacing: .08em; text-align: center; }
  .beat.combat .mid .spoils { color: var(--muted); display: block;
    font-family: var(--serif); font-size: .82rem; letter-spacing: 0; }

  /* ---- choices: the action menu ----------------------------------------- */
  .beat.choices .box { background: var(--surface); border: 1px solid var(--edge);
    border-radius: 6px; padding: .9rem 1.1rem; margin: .4rem 0; }
  .beat.choices h3 { font-family: var(--mono); font-size: .66rem; color: var(--ember);
    text-transform: uppercase; letter-spacing: .18em; font-weight: 400;
    margin-bottom: .45rem; }
  .beat.choices ul { padding: 0; }
  .beat.choices li { list-style: none; padding: .36rem 0; border-top: 1px solid var(--edge); }
  .beat.choices li:first-child { border-top: 0; }
  .beat.choices li p { margin: 0; }

  /* ---- rolls: a compact dice line --------------------------------------- */
  .beat.roll { display: flex; align-items: baseline; gap: .5rem; margin: .5rem 0;
    font-size: .8rem; color: var(--muted); }
  .beat.roll .die { font-size: .95rem; }
  .beat.roll .who { color: var(--parchment); }
  .beat.roll .expr { font-family: var(--mono); font-size: .76rem; color: var(--gold);
    letter-spacing: .03em; }
  .beat.roll .for { color: var(--parchment); }
  .beat.roll .vs { font-family: var(--mono); font-size: .72rem; }
  .beat.roll .mark.win { color: var(--moss); }
  .beat.roll .mark.lose { color: var(--blood); }

  /* ---- entity chips: cards in the flow of the story ---------------------- */
  .beat.entity { margin: .9rem 0; }
  .chip-card { display: flex; align-items: center; gap: .85rem; width: 100%;
    background: var(--surface); border: 1px solid var(--edge); border-radius: 6px;
    padding: .7rem .95rem; cursor: pointer; text-align: left; color: inherit;
    font: inherit; transition: border-color .15s; }
  .chip-card:hover { border-color: var(--gold); }
  .chip-card .disc { width: 2.6rem; height: 2.6rem; border-radius: 50%; flex: none;
    display: grid; place-items: center; font-size: 1.1rem; color: #fff;
    background: var(--edge); border: 1px solid var(--gold); }
  .chip-card .disc.pc { background: #2563eb; }
  .chip-card .disc.monster { background: #dc2626; }
  .chip-card .disc.npc, .chip-card .disc.quest { color: var(--gold); font-size: 1.2rem; }
  .chip-card .who { min-width: 0; }
  .chip-card .who .nm { font-size: 1rem; color: var(--parchment); }
  .chip-card .who .ln { font-size: .72rem; color: var(--muted); font-family: var(--mono); }
  .chip-card .pills { margin-left: auto; display: flex; gap: .35rem; flex: none;
                      flex-wrap: wrap; justify-content: flex-end; }
  .pill { font-family: var(--mono); font-size: .66rem; padding: .14rem .45rem;
          border: 1px solid var(--edge); border-radius: 3px; color: var(--muted);
          white-space: nowrap; }
  .pill b { color: var(--parchment); font-weight: 600; }
  .pill.evt { border-color: var(--ember); color: var(--ember); letter-spacing: .06em; }

  /* clickable entity names inside narration */
  .ent { border-bottom: 1px dotted var(--gold); cursor: pointer; }
  .ent:hover { color: var(--gold); }

  /* ---- the entity sheet overlay ------------------------------------------ */
  #overlay { position: fixed; inset: 0; background: rgba(12, 9, 7, .74);
             display: grid; place-items: center; z-index: 10; padding: 1.2rem; }
  #overlay[hidden] { display: none; }

  /* ---- the glossary overlay ---------------------------------------------- */
  #gloss { position: fixed; inset: 0; background: rgba(12, 9, 7, .96); z-index: 5;
    display: grid; grid-template-columns: 210px minmax(0, 1fr); overflow: hidden; }
  #gloss[hidden] { display: none; }
  .gl-side { border-right: 1px solid var(--edge); padding: 1rem .6rem; overflow-y: auto;
    display: flex; flex-direction: column; gap: .3rem; background: var(--surface); }
  .gl-side .gl-title { font-family: var(--mono); font-size: .7rem; color: var(--muted);
    letter-spacing: .12em; margin: 0 .5rem .6rem; }
  .gl-side button { text-align: left; background: transparent; border: 0; cursor: pointer;
    color: var(--parchment); font-family: var(--serif); font-size: 1rem;
    padding: .45rem .6rem; border-radius: 5px; }
  .gl-side button:hover { background: var(--edge); }
  .gl-side button.active { background: var(--edge); color: var(--gold); }
  .gl-side .gl-close { margin-top: auto; color: var(--muted); font-family: var(--mono);
    font-size: .72rem; }
  .glossary { overflow-y: auto; padding: 0 0 3rem; }
  .glossary .gl-banner { width: 100%; max-height: 320px; object-fit: cover; display: block; }
  .glossary .gl-head { padding: 1.2rem 2rem .2rem; }
  .glossary h1 { font-family: var(--serif); font-size: 2rem; color: var(--gold); margin: 0; }
  .glossary .gl-body { padding: 1rem 2rem; max-width: 860px; }
  .glossary h3 { font-family: var(--serif); color: var(--ember); margin: 0 0 .3rem; }
  .glossary .card { border: 1px solid var(--edge); border-radius: 8px; background: var(--surface);
    padding: 1rem 1.2rem; margin: 1rem 0; overflow: hidden; }
  .glossary .roster img.portrait { float: left; width: 120px; height: 120px; object-fit: cover;
    border-radius: 6px; border: 1px solid var(--edge); margin: 0 1rem .5rem 0; }
  .glossary .tag { display: inline-block; background: var(--edge); color: var(--parchment);
    border-radius: 4px; padding: .1rem .55rem; font-size: .78rem; font-family: var(--mono);
    margin: 0 .3rem .3rem 0; }
  .glossary .lead { margin: .4rem 0; }
  .glossary .fullbleed { text-align: center; margin: 1.4rem 0; }
  .glossary .fullbleed img { max-width: 100%; border-radius: 8px; }
  .glossary svg { max-width: 100%; height: auto; }
  @media (max-width: 720px) {
    #gloss { grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr); }
    .gl-side { flex-direction: row; flex-wrap: wrap; border-right: 0; border-bottom: 1px solid var(--edge); }
    .gl-side .gl-title { width: 100%; }
  }
  .sheet { background: var(--surface); border: 1px solid var(--gold); border-radius: 8px;
           max-width: 34rem; width: 100%; max-height: 86vh; overflow-y: auto;
           padding: 1.35rem 1.5rem; position: relative; }
  .sheet .close { position: absolute; top: .55rem; right: .7rem; background: none;
                  border: 0; color: var(--muted); font-size: 1.15rem; cursor: pointer;
                  font-family: var(--mono); }
  .sheet .close:hover { color: var(--parchment); }
  .sheet .head { display: flex; align-items: center; gap: .95rem; margin-bottom: .4rem; }
  .sheet .head .disc { width: 3rem; height: 3rem; border-radius: 50%; flex: none;
    display: grid; place-items: center; font-size: 1.3rem; color: #fff;
    background: var(--edge); border: 1px solid var(--gold); }
  .sheet .head .disc.pc { background: #2563eb; }
  .sheet .head .disc.monster { background: #dc2626; }
  .sheet .head .disc.npc, .sheet .head .disc.quest { color: var(--gold); }
  .sheet .head .nm { font-size: 1.25rem; }
  .sheet .head .ln { font-size: .74rem; color: var(--muted); font-family: var(--mono); }
  .sheet .vitals { display: flex; gap: .4rem; flex-wrap: wrap; margin: .5rem 0 .2rem; }
  .sheet .attrs { display: grid; grid-template-columns: repeat(6, 1fr); gap: .4rem;
                  margin: .75rem 0 .2rem; }
  .sheet .attrs .a { text-align: center; background: var(--ink);
    border: 1px solid var(--edge); border-radius: 4px; padding: .32rem .1rem; }
  .sheet .attrs .a .k { font-family: var(--mono); font-size: .58rem; color: var(--muted);
                        letter-spacing: .08em; }
  .sheet .attrs .a .v { font-size: .95rem; }
  .sheet .sec { margin-top: .85rem; }
  .sheet .sec h4 { font-family: var(--mono); font-size: .62rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .18em; font-weight: 400;
    margin-bottom: .32rem; }
  .sheet .tagrow { display: flex; flex-wrap: wrap; gap: .3rem; }
  /* a known spell you can click through to its card */
  .sheet .chip.spell { background: var(--gold); cursor: pointer; }
  .sheet .chip.spell:hover { background: var(--ember); }
  /* spell-slot pips: one per level, dimmed when the level is spent out */
  .sheet .slots { display: flex; flex-wrap: wrap; gap: .35rem; }
  .sheet .slots .slot { font-family: var(--mono); font-size: .68rem; color: var(--parchment);
    background: var(--ink); border: 1px solid var(--gold); border-radius: 3px;
    padding: .1rem .45rem; }
  .sheet .slots .slot b { color: var(--gold); font-weight: 600; }
  .sheet .slots .slot.spent { border-color: var(--edge); color: var(--muted); opacity: .6; }
  .sheet .slots .slot.spent b { color: var(--muted); }
  .sheet .desc { color: var(--parchment); }
  .sheet .desc.muted { color: var(--muted); }
  .sheet .bio { margin-top: .95rem; border-top: 1px solid var(--edge); padding-top: .75rem; }
  .sheet .bio p { margin: 0 0 .55rem; }
  .sheet .artwork { margin: .8rem 0 .2rem; }
  .sheet .artwork svg, .sheet .artwork img { display: block; width: 100%; height: auto;
                        border-radius: 5px; border: 1px solid var(--edge); }
  .chip-card .disc.location, .sheet .head .disc.location { color: var(--gold); font-size: 1.25rem; }
  .chip-card .disc.spell, .sheet .head .disc.spell { color: var(--gold); background: var(--edge); }
  #map-body [data-ref]:hover text { fill: var(--ember); }
  .sheet .kv { display: flex; justify-content: space-between; gap: 1rem;
    font-family: var(--mono); font-size: .74rem; padding: .2rem 0;
    border-top: 1px solid var(--edge); color: var(--muted); }
  .sheet .kv:first-of-type { border-top: 0; }
  .sheet .kv .v { color: var(--parchment); text-align: right; }

  /* ---- the rail: cards off the engine ----------------------------------- */
  .card { background: var(--surface); border: 1px solid var(--edge);
          border-radius: 4px; padding: .9rem 1rem; margin-bottom: 1.2rem; }
  .card h2 { font-size: .72rem; font-family: var(--mono); font-weight: 400;
             color: var(--muted); letter-spacing: .14em; text-transform: uppercase;
             margin-bottom: .6rem; }
  #map svg { max-width: 100%; height: auto; border-radius: 3px; }
  #map .empty { color: var(--muted); font-style: italic; font-size: .9rem; }
  #map .turn { font-family: var(--mono); font-size: .78rem; color: var(--gold);
               margin-bottom: .5rem; }
  #legend { display: flex; flex-wrap: wrap; gap: .3rem .7rem; margin-top: .55rem; }
  #legend .item { display: flex; align-items: center; gap: .32rem; font-size: .74rem;
                  cursor: pointer; }
  #legend .item:hover { color: var(--gold); }
  #legend .swatch { width: 16px; height: 16px; border-radius: 50%; color: #fff;
                    font-family: var(--mono); font-size: .62rem; display: grid;
                    place-items: center; flex: none; }
  #legend .item.up { color: var(--ember); }
  #legend .item.up .swatch { box-shadow: 0 0 0 2px var(--ember); }

  /* terrain key: what the map's coloured squares mean */
  #terrain-legend { display: flex; flex-wrap: wrap; gap: .3rem .7rem;
                    margin-top: .4rem; padding-top: .4rem; }
  #terrain-legend:not(:empty) { border-top: 1px dashed var(--edge); }
  #terrain-legend .item { display: flex; align-items: center; gap: .32rem;
                          font-size: .72rem; color: var(--muted); }
  #terrain-legend .swatch { width: 16px; height: 16px; border-radius: 3px;
                            border: 1px solid var(--edge); flex: none; }

  .fighter { display: grid; grid-template-columns: 1fr auto; gap: .15rem .7rem;
             padding: .45rem .4rem; border-top: 1px solid var(--edge);
             margin: 0 -.4rem; border-radius: 3px; }
  .fighter:first-of-type { border-top: 0; }
  .fighter.click { cursor: pointer; }
  .fighter.click:hover { background: rgba(217, 151, 59, .07); }
  /* whose turn it is, echoed from the map's highlight */
  .fighter.active { background: rgba(217, 151, 59, .13);
                    box-shadow: inset 3px 0 0 var(--ember); }
  #purse { font-family: var(--mono); font-size: .74rem; color: var(--gold);
           margin-top: .6rem; padding-top: .55rem; border-top: 1px solid var(--edge); }
  #purse .stash { color: var(--muted); }
  #purse .pooled { color: var(--parchment); font-size: .72rem; margin-top: .3rem; }
  #purse .pooled b { color: var(--gold); }
  #purse .pooled .breakdown { color: var(--muted); }
  #internals .row { display: flex; justify-content: space-between; gap: 1rem;
                    font-family: var(--mono); font-size: .72rem; color: var(--muted);
                    padding: .18rem 0; border-top: 1px solid var(--edge); }
  #internals .row:first-child { border-top: 0; }
  #internals .row .k { color: var(--parchment); }
  .fighter .name { font-size: .92rem; }
  .fighter .name .dead { text-decoration: line-through; color: var(--muted); }
  .fighter .tags { grid-column: 1 / -1; display: flex; gap: .35rem; flex-wrap: wrap; }
  .chip { font-family: var(--mono); font-size: .66rem; color: var(--ink);
          background: var(--muted); padding: .08rem .4rem; border-radius: 2px; }
  .chip.warn { background: var(--blood); color: var(--parchment); }
  .chip.good { background: var(--moss); }
  .chip.aloft { background: var(--gold); }
  /* narrative wounds — visible physical damage, severity by shade */
  .chip.wound { background: #7a2e28; color: var(--parchment); }
  .chip.wound.serious { background: #a33227; }
  .chip.wound.mortal { background: #c2362a; font-weight: 600; }
  .sheet .chip.wound { font-family: var(--serif); font-size: .74rem; }
  .hp { display: flex; align-items: center; gap: .5rem; font-family: var(--mono);
        font-size: .74rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .hp .bar { width: 84px; height: 7px; background: var(--ink); border-radius: 4px;
             overflow: hidden; flex: none; }
  .hp .bar i { display: block; height: 100%; }
  /* fixed-width, right-aligned numbers so "9/10" and "120/140" line up and the
     AC that follows sits in the same column across every row */
  .hp .num { min-width: 4.8em; text-align: right; flex: none; }
  .hp .ac { color: var(--gold); min-width: 2.6em; text-align: right; flex: none; }
  .hp .ac::before { content: "⛊ "; }
  /* a PC's personal purse, tucked under their HP in the same column */
  .fighter .gold { grid-column: 2; justify-self: end; font-family: var(--mono);
                   font-size: .68rem; color: var(--gold); }
  .fighter .gold::before { content: "◈ "; }
  .status { font-family: var(--mono); font-size: .72rem; }
  .status.healthy { color: var(--moss); } .status.wounded { color: var(--gold); }
  .status.bloodied { color: var(--blood); } .status.down { color: var(--muted); }

  #quests li { list-style: none; padding: .3rem 0; font-size: .88rem;
               border-top: 1px solid var(--edge); cursor: pointer; }
  #quests li:hover { color: var(--gold); }
  #quests li:first-child { border-top: 0; }
  #quests .q-status { font-family: var(--mono); font-size: .68rem; color: var(--muted);
                      margin-left: .5rem; }
  #timeline li { list-style: none; font-family: var(--mono); font-size: .74rem;
                 color: var(--muted); padding: .22rem 0; border-top: 1px solid var(--edge); }
  #timeline li:first-child { border-top: 0; }
  #internals pre { font-family: var(--mono); font-size: .72rem; color: var(--muted);
                   overflow-x: auto; }
  .offline { color: var(--blood); font-family: var(--mono); font-size: .72rem; }
  :focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }
</style>
</head>
<body>
<header>
  <h1 id="world">…</h1>
  <span class="where" id="where"></span>
  <span class="pulse" id="pulse" title="live — updates automatically"></span>
  <span class="lens" id="lens"></span>
  <button id="gloss-btn" type="button">Glossary</button>
</header>

<div class="table">
  <main id="story" aria-live="polite">
    <div class="feed" id="feed"></div>
    <div class="empty" id="story-empty" hidden></div>
  </main>

  <aside>
    <div class="card" id="map"><h2>Map</h2><div class="turn" id="turn" hidden></div>
      <div id="map-body"><p class="empty">No encounter running.</p></div>
      <div id="legend"></div>
      <div id="terrain-legend"></div></div>
    <div class="card" id="party"><h2>Party</h2><div id="party-body"></div>
      <div id="purse" hidden></div></div>
    <div class="card" id="foes" hidden><h2>Opposition</h2><div id="foes-body"></div></div>
    <div class="card" id="quests"><h2>Quests</h2><ul id="quests-body"></ul></div>
    <div class="card" id="timeline" hidden><h2>Timeline</h2><ul id="timeline-body"></ul></div>
    <div class="card" id="internals" hidden><h2>GM internals</h2><div id="internals-body"></div></div>
    <p class="offline" id="offline" hidden>connection lost — retrying…</p>
  </aside>
</div>

<div id="overlay" hidden role="dialog" aria-modal="true"></div>
<div id="gloss" hidden role="dialog" aria-modal="true" aria-label="Glossary"></div>

<script>
const GM = location.pathname.replace(/\/+$/, "") === "/gm";
const LENS = GM ? "gm" : "player";
const lensEl = document.getElementById("lens");
lensEl.textContent = GM ? "GM TABLE" : "PLAYER TABLE";
if (GM) lensEl.classList.add("gm");

let cursor = { offset: 0 };
let fetchingStory = false;
let storyDirty = false;
let lastState = null;
let hasStory = false;

function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
}

/* ---- entity cards ------------------------------------------------------- */

async function fetchEntity(ref) {
  const r = await fetch("/api/entity/" + encodeURIComponent(ref) + "?lens=" + LENS);
  if (!r.ok) return null;
  return r.json();
}

function disc(kind, name) {
  const d = el("span", "disc " + kind);
  d.textContent = kind === "quest" ? "❧" : kind === "npc" ? "☺"
    : kind === "location" ? "⌖" : kind === "spell" ? "✦" : (name || "?").slice(0, 1);
  return d;
}

function pill(label, value) {
  const p = el("span", "pill");
  if (value === undefined) { p.textContent = label; return p; }
  const b = el("b", null, String(value));
  p.appendChild(b);
  p.appendChild(document.createTextNode(" " + label));
  return p;
}

function chipLine(card) {
  // the one-line subtitle under a chip's name
  if (card.kind === "pc") {
    let ln = card.race + " " + card.class + " · level " + card.level;
    if (card.played_by) ln += " · " + card.played_by;
    return ln;
  }
  if (card.kind === "monster") return card.status || (card.dead ? "dead" : "bestiary");
  if (card.kind === "npc")
    return [card.role, card.disposition].filter(Boolean).join(" · ");
  if (card.kind === "quest") return card.status;
  if (card.kind === "location")
    return [card.terrain, card.rumored ? "rumored" : card.party_here ? "the party is here" : null]
      .filter(Boolean).join(" · ");
  if (card.kind === "spell")
    return [card.level === 0 ? "cantrip" : "level " + card.level, card.resolve]
      .filter(Boolean).join(" · ");
  return "";
}

function chipPills(card) {
  const out = [];
  if (card.kind === "pc") {
    out.push(pill("hp", card.hp + "/" + card.max_hp));
    out.push(pill("ac", card.ac));
  } else if (card.kind === "monster" && "hp" in card && card.hp != null) {
    out.push(pill("hp", card.hp + "/" + card.max_hp));
    if (card.ac != null) out.push(pill("ac", card.ac));
  } else if (card.kind === "quest" && card.reward) {
    if (card.reward.gold) out.push(pill("gp", card.reward.gold));
    if (card.reward.xp) out.push(pill("xp", card.reward.xp));
    if ((card.reward.items || []).length) out.push(pill("item", card.reward.items.length));
  }
  return out;
}

function entityChip(ref, hintName, hintKind, eventTag) {
  const btn = el("button", "chip-card");
  btn.appendChild(disc(hintKind || "npc", hintName));
  const who = el("span", "who");
  who.appendChild(el("div", "nm", hintName || ref));
  who.appendChild(el("div", "ln", "…"));
  btn.appendChild(who);
  const pills = el("span", "pills");
  if (eventTag) pills.appendChild(Object.assign(el("span", "pill evt", eventTag)));
  btn.appendChild(pills);
  btn.addEventListener("click", () => openEntity(ref));
  fetchEntity(ref).then(card => {
    if (!card || card.error) { who.querySelector(".ln").textContent = ""; return; }
    btn.replaceChildren();
    btn.appendChild(disc(card.kind, card.name));
    const w = el("span", "who");
    w.appendChild(el("div", "nm", card.name));
    w.appendChild(el("div", "ln", chipLine(card)));
    btn.appendChild(w);
    const ps = el("span", "pills");
    if (eventTag) ps.appendChild(el("span", "pill evt", eventTag));
    for (const p of chipPills(card)) ps.appendChild(p);
    btn.appendChild(ps);
  });
  return btn;
}

function sheetSection(title, node) {
  const s = el("div", "sec");
  s.appendChild(el("h4", null, title));
  s.appendChild(node);
  return s;
}

function tagRow(items, cls) {
  const row = el("div", "tagrow");
  for (const t of items || []) row.appendChild(el("span", "chip" + (cls ? " " + cls : ""), t));
  return row;
}

function kvRow(k, v) {
  const r = el("div", "kv");
  r.appendChild(el("span", "k", k));
  r.appendChild(el("span", "v", v));
  return r;
}

function spellChip(name) {
  // a known spell, clickable through to its own card in the same overlay
  const c = el("span", "chip spell", (name || "").replace(/_/g, " "));
  c.addEventListener("click", () => openEntity("spell:" + name));
  return c;
}

function buildSpellsSection(card) {
  // spell slots (remaining/max per level) plus known spells grouped cantrip vs
  // leveled; returns a fragment, or null when this character casts nothing
  const frag = document.createDocumentFragment();
  const slots = card.spell_slots;
  if (slots && Object.keys(slots).length) {
    const box = el("div", "slots");
    for (const lvl of Object.keys(slots).sort((a, b) => a - b)) {
      const s = slots[lvl] || {};
      const cur = s.current ?? 0, max = s.max ?? 0;
      const slot = el("span", "slot" + (cur === 0 ? " spent" : ""));
      slot.appendChild(el("b", null, "L" + lvl));
      slot.appendChild(document.createTextNode(" " + cur + "/" + max));
      box.appendChild(slot);
    }
    frag.appendChild(sheetSection("Spell slots", box));
  }
  const spells = (card.spells && card.spells.length) ? card.spells
    : (card.spells_known || []).map(n => ({ name: n, level: null }));
  if (spells.length) {
    const groups = new Map();
    for (const sp of spells) {
      const key = (sp.level == null) ? "?" : sp.level;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(sp.name);
    }
    const keys = [...groups.keys()].sort((a, b) =>
      a === "?" ? 1 : b === "?" ? -1 : a - b);
    for (const key of keys) {
      const title = key === "?" ? "Spells"
        : key === 0 ? "Cantrips (at will)" : "Level " + key + " spells";
      const row = el("div", "tagrow");
      for (const n of groups.get(key)) row.appendChild(spellChip(n));
      frag.appendChild(sheetSection(title, row));
    }
  }
  return frag.childNodes.length ? frag : null;
}

function buildSheet(card) {
  const sh = el("div", "sheet");
  const close = el("button", "close", "✕");
  close.setAttribute("aria-label", "close");
  close.addEventListener("click", closeOverlay);
  sh.appendChild(close);

  const head = el("div", "head");
  head.appendChild(disc(card.kind, card.name));
  const who = el("div");
  who.appendChild(el("div", "nm", card.name));
  who.appendChild(el("div", "ln", chipLine(card)));
  head.appendChild(who);
  sh.appendChild(head);

  // a monster portrait or a location cover banner — both served by the /art/ route
  const bannerSrc = (card.kind === "monster" && card.image) ? card.image
                  : (card.kind === "location" && card.banner) ? card.banner
                  : null;
  if (bannerSrc) {
    const art = el("div", "artwork");
    const img = document.createElement("img");
    img.src = "/" + bannerSrc;           // content-relative
    img.alt = card.name;
    img.loading = "lazy";
    art.appendChild(img);
    sh.appendChild(art);
  }

  const vitals = el("div", "vitals");
  for (const p of chipPills(card)) vitals.appendChild(p);
  if (card.kind === "pc") {
    vitals.appendChild(pill("speed", card.speed));
    vitals.appendChild(pill("gold", card.gold));
    vitals.appendChild(pill("xp", card.xp));
  }
  if (vitals.children.length) sh.appendChild(vitals);

  if (card.attributes) {
    const grid = el("div", "attrs");
    for (const [k, v] of Object.entries(card.attributes)) {
      const a = el("div", "a");
      a.appendChild(el("div", "k", k));
      a.appendChild(el("div", "v", String(v)));
      grid.appendChild(a);
    }
    sh.appendChild(grid);
  }

  if (card.description) sh.appendChild(sheetSection("Description",
      el("p", "desc muted", card.description)));
  if ((card.skills || []).length) sh.appendChild(sheetSection("Skills", tagRow(card.skills)));
  if ((card.effects || []).length) sh.appendChild(sheetSection("Effects", tagRow(card.effects, "warn")));
  if ((card.wounds || []).length) {
    const row = el("div", "tagrow");
    for (const w of card.wounds)
      row.appendChild(el("span", "chip wound " + (w.severity || "serious"), "🩹 " + w.text));
    sh.appendChild(sheetSection("Wounds", row));
  }
  if ((card.features || []).length) sh.appendChild(sheetSection("Features", tagRow(card.features)));
  const spellsSec = buildSpellsSection(card);
  if (spellsSec) sh.appendChild(spellsSec);
  if ((card.equipped || []).length) sh.appendChild(sheetSection("Equipped",
      tagRow(card.equipped.map(i => i.replace(/_/g, " ")))));
  // the full pack, not just what's in hand — equipped items marked, quantities shown
  if ((card.inventory || []).length) {
    const row = el("div", "tagrow");
    for (const it of card.inventory) {
      const label = it.item.replace(/_/g, " ") + (it.qty > 1 ? " ×" + it.qty : "");
      row.appendChild(el("span", "chip" + (it.equipped ? " good" : ""), label));
    }
    sh.appendChild(sheetSection("Carried", row));
  }
  if ((card.attacks || []).length) {
    const box = el("div");
    for (const a of card.attacks)
      box.appendChild(kvRow(a.name, "+" + a.attack_mod + " · " + a.damage +
                            (a.range > 1 ? " · range " + a.range : "")));
    sh.appendChild(sheetSection("Attacks", box));
  }
  if (card.kind === "spell") {
    const box = el("div");
    box.appendChild(kvRow("level", card.level === 0 ? "cantrip (no slot)" : String(card.level)));
    if (card.action) box.appendChild(kvRow("action", card.action));
    if (card.range != null)
      box.appendChild(kvRow("range", card.range <= 1 ? "touch / melee" : card.range + " squares"));
    if (card.resolve) {
      const r = card.resolve === "save" && card.save_attr ? card.save_attr + " save"
        : card.resolve === "attack" ? "spell attack"
        : card.resolve === "auto" ? "always lands" : card.resolve;
      box.appendChild(kvRow("resolve", r));
    }
    if (card.on_save) box.appendChild(kvRow("on save", card.on_save));
    if (card.damage) box.appendChild(kvRow("damage", card.damage));
    if (card.heal) box.appendChild(kvRow("heal", card.heal));
    if (card.area) box.appendChild(kvRow("area", (card.area.shape || "burst") + ", radius " + card.area.radius));
    if (card.effect) box.appendChild(kvRow("effect", card.effect.name + " (" + card.effect.duration + " rounds)"));
    sh.appendChild(sheetSection("Spell", box));
  }
  if (card.kind === "npc") {
    const box = el("div");
    if (card.location) box.appendChild(kvRow("location", card.location));
    if (card.disposition) box.appendChild(kvRow("disposition", card.disposition));
    if (box.children.length) sh.appendChild(sheetSection("Standing", box));
    if (card.wants) sh.appendChild(sheetSection("Wants (GM)", el("p", "desc muted", card.wants)));
  }
  if (card.kind === "quest") {
    const box = el("div");
    box.appendChild(kvRow("status", card.status));
    if (card.reward) {
      const r = card.reward;
      const bits = [];
      if (r.gold) bits.push(r.gold + " gp");
      if (r.xp) bits.push(r.xp + " xp");
      for (const i of r.items || []) bits.push(i.replace(/_/g, " "));
      if (bits.length) box.appendChild(kvRow("reward", bits.join(" · ")));
    }
    if (card.deadline) box.appendChild(kvRow("deadline", card.deadline.date));
    if ((card.accepted_by || []).length)
      box.appendChild(kvRow("accepted by", card.accepted_by.join(", ")));
    sh.appendChild(sheetSection("Terms", box));
  }
  if (card.kind === "location" && !card.rumored) {
    if (card.art_svg) {
      const art = el("div", "artwork");
      art.innerHTML = card.art_svg;
      sh.appendChild(art);
    }
    const box = el("div");
    for (const c of card.connections || [])
      box.appendChild(kvRow(c.name, c.hours + "h"));
    if (box.children.length) sh.appendChild(sheetSection("Ways out", box));
    if ((card.npcs || []).length) {
      const nbox = el("div");
      for (const n of card.npcs)
        nbox.appendChild(kvRow(n.name, n.role || ""));
      sh.appendChild(sheetSection("Folk here (GM)", nbox));
    }
  }
  if (card.notes) sh.appendChild(sheetSection("Notes (GM)", el("p", "desc muted", card.notes)));
  if (card.bio_html) {
    const bio = el("div", "bio");
    bio.innerHTML = card.bio_html;
    sh.appendChild(bio);
  }
  return sh;
}

const overlay = document.getElementById("overlay");
async function openEntity(ref) {
  const card = await fetchEntity(ref);
  if (!card || card.error) return;
  overlay.replaceChildren(buildSheet(card));
  overlay.hidden = false;
  overlay.querySelector(".close").focus();
}
function closeOverlay() { overlay.hidden = true; overlay.replaceChildren(); }
overlay.addEventListener("click", e => { if (e.target === overlay) closeOverlay(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeOverlay(); });

/* ---- the glossary overlay ------------------------------------------------ */

const glossEl = document.getElementById("gloss");

async function loadGlossSection(id, sideButtons) {
  sideButtons.forEach(b => b.classList.toggle("active", b.dataset.id === id));
  const r = await fetch("/api/glossary/" + encodeURIComponent(id) + "?lens=" + LENS);
  const content = glossEl.querySelector(".glossary");
  content.replaceChildren();
  if (!r.ok) { content.append(el("p", "gl-body", "Could not load this section.")); return; }
  const sec = await r.json();
  if (sec.cover) {
    const img = el("img", "gl-banner"); img.src = sec.cover; img.alt = ""; content.append(img);
  }
  const head = el("div", "gl-head"); head.append(el("h1", null, sec.title)); content.append(head);
  const bodyWrap = el("div", "gl-body");
  bodyWrap.innerHTML = sec.body_html;   // server-escaped content (see spec: trust model)
  content.append(bodyWrap);
  content.scrollTop = 0;
}

async function openGlossary() {
  const r = await fetch("/api/glossary");
  const manifest = r.ok ? await r.json() : [];
  const side = el("nav", "gl-side");
  side.append(el("div", "gl-title", "GLOSSARY"));
  const buttons = manifest.map(sec => {
    const b = el("button", null, sec.title); b.dataset.id = sec.id;
    b.addEventListener("click", () => loadGlossSection(sec.id, buttons));
    side.append(b); return b;
  });
  const close = el("button", "gl-close", "✕ Close"); close.addEventListener("click", closeGlossary);
  side.append(close);
  const content = el("div", "glossary");
  glossEl.replaceChildren(side, content);
  glossEl.hidden = false;
  close.focus();
  if (manifest.length) {
    loadGlossSection(manifest[0].id, buttons);
  } else {
    content.append(el("p", "gl-body", "Could not load the glossary."));
  }
}

function closeGlossary() { glossEl.hidden = true; glossEl.replaceChildren(); }

document.getElementById("gloss-btn").addEventListener("click", openGlossary);
glossEl.addEventListener("click", e => { if (e.target === glossEl) closeGlossary(); });
document.addEventListener("keydown", e => { if (e.key === "Escape" && !glossEl.hidden) closeGlossary(); });

/* ---- linking names in prose to their cards ------------------------------ */

function knownEntities() {
  const map = new Map();
  if (!lastState) return map;
  for (const pc of lastState.party || []) map.set(pc.name, pc.id);
  const enc = lastState.encounter;
  for (const f of (enc && enc.roster) || []) map.set(f.name, f.id);
  return map;
}

function linkNames(node) {
  const known = knownEntities();
  if (!known.size) return;
  const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT, {
    acceptNode: t => t.parentElement.closest("pre, code, .ent")
      ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT
  });
  const seen = new Set();
  const texts = [];
  while (walker.nextNode()) texts.push(walker.currentNode);
  for (const t of texts) {
    for (const [name, ref] of known) {
      if (seen.has(ref)) continue;
      const i = t.data.indexOf(name);
      if (i < 0) continue;
      // only once per beat — the first mention becomes the link
      const after = t.splitText(i);
      after.deleteData(0, name.length);
      const span = el("span", "ent", name);
      span.addEventListener("click", () => openEntity(ref));
      t.parentNode.insertBefore(span, after);
      seen.add(ref);
    }
  }
}

/* ---- rendering the feed by entry type ------------------------------------ */

function renderEntry(e) {
  if (e.type === "narration") {
    const beat = el("div", "beat new gm");
    beat.innerHTML = e.html;
    linkNames(beat);
    return beat;
  }
  if (e.type === "scene") {
    const beat = el("div", "beat new scene");
    beat.appendChild(el("div", "rule"));
    beat.appendChild(el("div", "title", e.title));
    if (e.subtitle) beat.appendChild(el("div", "sub", e.subtitle));
    beat.appendChild(el("div", "rule"));
    return beat;
  }
  if (e.type === "system") {
    const beat = el("div", "beat new system");
    const mid = el("span", "mid");
    mid.innerHTML = e.html;
    beat.appendChild(mid);
    return beat;
  }
  if (e.type === "combat") {
    const beat = el("div", "beat new combat");
    const mid = el("span", "mid");
    mid.appendChild(document.createTextNode(
      (e.event === "end" ? "⚔ " : "⚔ ") +
      (e.event === "end" ? e.name + " — the dust settles" : e.name)));
    if (e.html) {
      const spoils = el("span", "spoils");
      spoils.innerHTML = e.html;
      mid.appendChild(spoils);
    }
    beat.appendChild(mid);
    return beat;
  }
  if (e.type === "choices") {
    const beat = el("div", "beat new choices");
    const box = el("div", "box");
    box.appendChild(el("h3", null, e.title || "What you can do right now"));
    const ul = el("ul");
    for (const item of e.items || []) {
      const li = el("li");
      li.innerHTML = item;
      ul.appendChild(li);
    }
    box.appendChild(ul);
    beat.appendChild(box);
    return beat;
  }
  if (e.type === "action") {
    const beat = el("div", "beat new action");
    const speaker = el("div", "speaker", e.name || e.pc);
    if (e.pc) speaker.addEventListener("click", () => openEntity(e.pc));
    beat.appendChild(speaker);
    const line = el("div", "line");
    line.innerHTML = e.html;
    beat.appendChild(line);
    return beat;
  }
  if (e.type === "roll") {
    const beat = el("div", "beat new roll");
    beat.appendChild(el("span", "die", "🎲"));
    const line = el("span", "line");
    line.appendChild(el("span", "who", e.actor || "?"));
    line.appendChild(document.createTextNode(" rolled "));
    line.appendChild(el("span", "expr", (e.expr || "") + " = " + (e.total ?? "")));
    if (e.label) {
      line.appendChild(document.createTextNode(" — "));
      line.appendChild(el("span", "for", e.label));
    }
    if (e.target_num != null)
      line.appendChild(el("span", "vs", " (vs " + (e.target_kind || "") + " " + e.target_num + ")"));
    const win = ["hit", "success"].includes(e.outcome);
    const lose = ["miss", "fail"].includes(e.outcome);
    if (win || lose)
      line.appendChild(el("span", "mark " + (win ? "win" : "lose"), win ? " ✓" : " ✗"));
    beat.appendChild(line);
    return beat;
  }
  if (["character", "npc", "monster", "quest", "location"].includes(e.type) && e.ref) {
    const beat = el("div", "beat new entity");
    const kind = e.type === "character" ? "pc" : e.type;
    beat.appendChild(entityChip(e.ref, e.name, kind, e.type === "quest" ? e.event : null));
    return beat;
  }
  return null;   // unknown type from a newer engine — skip, don't break the feed
}

/* ---- rail rendering ------------------------------------------------------ */

function hpBar(hp, max, ac) {
  const frac = max > 0 ? hp / max : 0;
  const wrap = el("span", "hp");
  const bar = el("span", "bar");
  const fill = document.createElement("i");
  fill.style.width = Math.round(frac * 100) + "%";
  fill.style.background = frac > 2 / 3 ? "var(--moss)" : frac > 1 / 3 ? "var(--gold)" : "var(--blood)";
  bar.appendChild(fill);
  wrap.appendChild(bar);
  wrap.appendChild(el("span", "num", hp + "/" + max));
  if (ac != null) wrap.appendChild(el("span", "ac", String(ac)));
  return wrap;
}

function fighterRow(f, up) {
  const row = el("div", "fighter");
  if (f.id && f.id === up) row.classList.add("active");
  if (f.id) {
    row.classList.add("click");
    row.addEventListener("click", () => openEntity(f.id));
  }
  const name = el("span", "name");
  const label = el("span", f.dead ? "dead" : null, f.name);
  name.appendChild(label);
  row.appendChild(name);
  if ("hp" in f) row.appendChild(hpBar(f.hp, f.max_hp, f.ac));
  else if (f.status) row.appendChild(el("span", "status " + f.status, f.status));
  if (f.gold != null) row.appendChild(el("span", "gold", f.gold + " gp"));
  const tags = el("span", "tags");
  if (f.aloft) tags.appendChild(el("span", "chip aloft", "aloft"));
  for (const e of f.effects || []) {
    const bad = ["poisoned", "frightened", "prone", "grappled", "restrained", "dying", "unconscious", "weakened"].includes(e);
    tags.appendChild(el("span", "chip" + (bad ? " warn" : e === "hidden" ? " good" : ""), e));
  }
  const wounds = f.wounds || [];
  if (wounds.length) {
    const worst = wounds.some(w => w.severity === "mortal") ? "mortal"
                : wounds.some(w => w.severity === "serious") ? "serious" : "minor";
    const chip = el("span", "chip wound " + worst, "🩹 " + wounds.length);
    chip.title = wounds.map(w => w.text).join("; ");
    tags.appendChild(chip);
  }
  if (tags.children.length) row.appendChild(tags);
  return row;
}

function renderLegend(enc) {
  const box = document.getElementById("legend");
  box.replaceChildren();
  for (const t of (enc && enc.legend) || []) {
    const item = el("div", "item" + (t.id === enc.up ? " up" : ""));
    const sw = el("span", "swatch", t.sym);
    sw.style.background = t.side === "pc" ? "#2563eb" : "#dc2626";
    item.appendChild(sw);
    item.appendChild(el("span", null, t.name));
    item.addEventListener("click", () => openEntity(t.id));
    box.appendChild(item);
  }
}

function renderTerrainLegend(enc) {
  const box = document.getElementById("terrain-legend");
  box.replaceChildren();
  for (const t of (enc && enc.terrain_legend) || []) {
    const item = el("div", "item");
    const sw = el("span", "swatch");
    sw.style.background = t.color;
    item.appendChild(sw);
    item.appendChild(el("span", null, t.label));
    box.appendChild(item);
  }
}

function renderPurse(s) {
  const purse = document.getElementById("purse");
  const gold = s.party_gold, n = (s.stash || []).length;
  const personal = (s.party || []).reduce((t, pc) => t + (pc.gold || 0), 0);
  const pooled = (gold || 0) + personal;   // what the table has if everyone chips in
  if (gold === undefined && !n && !personal) { purse.hidden = true; return; }
  purse.replaceChildren();
  purse.appendChild(el("span", null, (gold || 0) + " gp party"));
  if (n) purse.appendChild(el("span", "stash", "  ·  " + n + " in stash"));
  if (personal) {
    const pool = el("div", "pooled");
    pool.appendChild(el("b", null, "pooled " + pooled + " gp"));
    pool.appendChild(el("span", "breakdown",
      "  (party " + (gold || 0) + " + purses " + personal + ")"));
    purse.appendChild(pool);
  }
  purse.hidden = false;
}

function renderInternals(s) {
  const card = document.getElementById("internals");
  const obj = s.internals || {};
  const rows = Object.entries(obj).filter(([, v]) =>
    v && (typeof v !== "object" || Object.keys(v).length));
  if (!rows.length) { card.hidden = true; return; }   // nothing to show — no clutter
  const body = document.getElementById("internals-body");
  body.replaceChildren();
  for (const [k, v] of rows) {
    const row = el("div", "row");
    row.appendChild(el("span", "k", k));
    row.appendChild(el("span", null, typeof v === "object" ? JSON.stringify(v) : String(v)));
    body.appendChild(row);
  }
  card.hidden = false;
}

function renderState(s) {
  lastState = s;
  document.getElementById("world").textContent = s.world || "claude-ttrpg";
  document.getElementById("where").textContent =
    (s.location || "?") + " — " + (s.clock ? s.clock.date + ", " + s.clock.hour + ":00" : "");

  const enc = s.encounter;
  const up = enc ? enc.up : null;

  const partyBody = document.getElementById("party-body");
  partyBody.replaceChildren();
  for (const pc of s.party || []) {
    partyBody.appendChild(fighterRow({
      id: pc.id,
      name: pc.name + "  ·  " + pc.race + " " + pc.class + " " + pc.level,
      hp: pc.hp, max_hp: pc.max_hp, ac: pc.ac, dead: false,
      gold: pc.gold,
      effects: (pc.effects || []).map(e => e.name),
      wounds: pc.wounds || [],
      aloft: false,
    }, up));
  }
  renderPurse(s);

  const turn = document.getElementById("turn");
  const mapBody = document.getElementById("map-body");
  const foes = document.getElementById("foes");
  const foesBody = document.getElementById("foes-body");
  if (enc && s.map_svg) {
    turn.hidden = false;
    turn.textContent = enc.name + " — round " + enc.round + " — up: " + enc.up;
    mapBody.innerHTML = s.map_svg;
    renderLegend(enc);
    renderTerrainLegend(enc);
    foesBody.replaceChildren();
    let any = false;
    for (const f of enc.roster || []) {
      if (f.side !== "monster") continue;
      any = true;
      foesBody.appendChild(fighterRow(f, up));
    }
    foes.hidden = !any;
  } else if (s.region_svg) {
    // between fights the map pane shows the world: fogged for players,
    // complete for the GM; visited nodes open their location cards
    turn.hidden = true;
    mapBody.innerHTML = s.region_svg;
    for (const node of mapBody.querySelectorAll("[data-ref]"))
      node.addEventListener("click", () => openEntity(node.dataset.ref));
    document.getElementById("legend").replaceChildren();
    document.getElementById("terrain-legend").replaceChildren();
    foes.hidden = true;
  } else {
    turn.hidden = true;
    mapBody.replaceChildren(el("p", "empty", "No encounter running."));
    document.getElementById("legend").replaceChildren();
    document.getElementById("terrain-legend").replaceChildren();
    foes.hidden = true;
  }

  const quests = document.getElementById("quests-body");
  quests.replaceChildren();
  for (const q of s.quests || []) {
    const li = el("li", null, q.title || q.id);
    li.appendChild(el("span", "q-status", q.status || ""));
    li.addEventListener("click", () => openEntity(q.id));
    quests.appendChild(li);
  }
  if (!quests.children.length) quests.appendChild(el("li", null, "The board is empty."));

  if (GM) {
    const tl = document.getElementById("timeline");
    tl.hidden = false;
    const tlBody = document.getElementById("timeline-body");
    tlBody.replaceChildren();
    for (const ev of (s.timeline || [])) tlBody.appendChild(el("li", null, ev.summary || ev.id));
    renderInternals(s);
  }
  refreshHero();
}

function buildHero(s) {
  const box = document.getElementById("story-empty");
  box.replaceChildren();
  box.className = "empty hero";
  box.appendChild(el("h2", null, s.world || "claude-ttrpg"));
  box.appendChild(el("div", "sub",
    (s.location || "") + (s.clock ? "  ·  " + s.clock.date + ", " + s.clock.hour + ":00" : "")));
  const meds = el("div", "medallions");
  for (const pc of s.party || []) {
    const m = el("div", "med");
    const disc = el("div", "disc", (pc.name || "?").slice(0, 1));
    m.appendChild(disc);
    m.appendChild(el("div", "who", pc.name));
    m.appendChild(el("div", "sub2", pc.race + " " + pc.class));
    meds.appendChild(m);
  }
  if ((s.party || []).length) box.appendChild(meds);
  const cta = el("p", "cta");
  cta.innerHTML = "Waiting for the session to begin — run <code>claude --agent gm</code> in this world and the story unfolds here.";
  box.appendChild(cta);
}

function refreshHero() {
  const box = document.getElementById("story-empty");
  if (hasStory || !lastState) { box.hidden = true; return; }
  buildHero(lastState);
  box.hidden = false;
}

async function fetchState() {
  try {
    const r = await fetch("/api/state?lens=" + LENS);
    if (r.ok) renderState(await r.json());
  } catch (e) { /* next tick retries */ }
}

async function fetchStory() {
  if (fetchingStory) { storyDirty = true; return; }  // a tick during a fetch isn't lost
  fetchingStory = true;
  try {
    const params = new URLSearchParams({ offset: cursor.offset, lens: LENS });
    const r = await fetch("/api/story?" + params);
    if (!r.ok) return;
    const data = await r.json();
    const feed = document.getElementById("feed");
    if (data.cursor.offset < cursor.offset) {
      feed.replaceChildren();   // the world was rewound — start the story over
    }
    cursor = data.cursor;
    const stick = window.innerHeight + window.scrollY >= document.body.offsetHeight - 200;
    for (const entry of data.entries || []) {
      const beat = renderEntry(entry);
      if (beat) feed.appendChild(beat);
    }
    hasStory = feed.children.length > 0;
    refreshHero();
    if (stick && data.entries.length) window.scrollTo(0, document.body.scrollHeight);
  } catch (e) { /* next tick retries */
  } finally {
    fetchingStory = false;
    if (storyDirty) { storyDirty = false; fetchStory(); }  // catch writes that landed mid-fetch
  }
}

const pulse = document.getElementById("pulse");
let pulseTimer = null;
function beat() {
  pulse.classList.remove("stale");
  pulse.classList.add("beat");
  clearTimeout(pulseTimer);
  pulseTimer = setTimeout(() => pulse.classList.remove("beat"), 450);
}

let stateTimer = null;
function connect() {
  const es = new EventSource("/events");
  es.addEventListener("state", () => {
    beat();
    clearTimeout(stateTimer);
    stateTimer = setTimeout(fetchState, 120);
  });
  es.addEventListener("story", () => { beat(); fetchStory(); });
  es.onopen = () => {
    document.getElementById("offline").hidden = true;
    pulse.classList.remove("stale");
    fetchState(); fetchStory();
  };
  es.onerror = () => {
    document.getElementById("offline").hidden = false;
    pulse.classList.add("stale");
  };
}

fetchState();
fetchStory();
connect();
</script>
